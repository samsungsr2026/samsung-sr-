      if(b.data.accounts)accounts=b.data.accounts;
      if(b.data.workers)WK=b.data.workers;
      if(b.data.suppliers)SUPPLIERS=b.data.suppliers;
      if(b.data.images)imgs=b.data.images;
      if(b.data.drawings)draws=b.data.drawings;
      // 저장
      sv();
      saveAccounts();
      saveWK();
      saveSUP();
      svImgs();
      const info=b.counts?` (재고 ${b.counts.inv}종 · 입출고 ${b.counts.txs}건 · 발주서 ${b.counts.orders}건)`:'';
      tst('✅ 복원 완료'+info,3500);
      document.getElementById('backup-restore').value='';
      setTimeout(()=>{go('dash');},500);
    }catch(err){
      console.error(err);
      tst('❌ 파일 읽기 실패: '+err.message,3500);
      document.getElementById('backup-restore').value='';
    }
  };
  r.onerror=function(){tst('❌ 파일 읽기 실패',3000);};
  r.readAsText(file,'utf-8');
}

function cmo(e){if(!e||e.target===document.getElementById('ov'))document.getElementById('ov').classList.remove('on');}

// ── 로그인 / 로그아웃 ─────────────────────────────────────────────
function openLogin(){
  document.getElementById('mo-title').textContent='🔐 관리자 로그인';
  document.getElementById('mb').innerHTML=`
    <div class="info-box">데이터 수정(입출고·품목수정·발주 등)은 관리자 권한이 필요합니다. 조회는 로그인 없이 가능합니다.</div>
    <div class="fg"><label class="fl">아이디</label>
      <input type="text" class="fi" id="login-id" placeholder="아이디 입력" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <div class="fg"><label class="fl">비밀번호</label>
      <input type="password" class="fi" id="login-pw" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="btn bbl btn-full" onclick="doLogin()">로그인</button>
    <div style="font-size:11px;color:var(--text3);margin-top:12px;text-align:center">
      최초 마스터 계정 — 아이디: <strong>master</strong> / 비밀번호: <strong>1234</strong><br>
      <span style="color:var(--red)">로그인 후 설정에서 비밀번호를 꼭 변경하세요</span>
    </div>`;
  document.getElementById('ov').classList.add('on');
  setTimeout(()=>document.getElementById('login-id')?.focus(),100);
}
function doLogin(){
  const id=document.getElementById('login-id')?.value?.trim()||'';
  const pw=document.getElementById('login-pw')?.value||'';
  if(!id){tst('아이디를 입력해주세요');return;}
  const acc=accounts.find(a=>a.id===id);
  if(!acc||acc.pw!==pw){tst('❌ 아이디 또는 비밀번호가 올바르지 않습니다');return;}
  curUser={id:acc.id,name:acc.name,role:acc.role};
  saveCurUser();
  cmo();
  tst('✓ '+acc.name+'님 로그인 ('+roleName(acc.role)+')');
  render();
}
function doLogout(){
  if(!curUser)return;
  if(!confirm('로그아웃 하시겠습니까?\n로그아웃 후에는 조회만 가능합니다.'))return;
  curUser=null;saveCurUser();
  tst('로그아웃 되었습니다 (조회 전용 모드)');
  render();
}

// ── 계정 관리 (마스터 전용) ───────────────────────────────────────
function openAccountMgr(){
  if(!isMaster()){tst('🔒 계정 관리는 마스터 관리자만 가능합니다');return;}
  document.getElementById('mo-title').textContent='👑 관리자 계정 관리';
  renderAccountMgr();
  document.getElementById('ov').classList.add('on');
}
function renderAccountMgr(){
  document.getElementById('mb').innerHTML=`
    <div class="info-box">관리자·일반 사용자 계정을 추가하거나 삭제합니다. 관리자 이상만 데이터를 수정할 수 있습니다.</div>
    <div style="font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;margin-bottom:8px">등록된 계정 (${accounts.length})</div>
    ${accounts.map((a,i)=>`
      <div style="display:flex;align-items:center;gap:10px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:7px">
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:700">${a.name}
            <span style="font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;margin-left:6px;background:${a.role==='master'?'var(--purple-bg);color:var(--purple)':a.role==='admin'?'var(--blue-bg);color:var(--blue)':'var(--bg4);color:var(--text2)'}">${roleName(a.role)}</span>
          </div>
          <div style="font-size:11px;color:var(--text3);font-family:monospace">ID: ${a.id}</div>
        </div>
        ${a.role==='master'&&accounts.filter(x=>x.role==='master').length<=1
          ? '<span style="font-size:11px;color:var(--text3)">삭제 불가</span>'
          : `<button onclick="delAccount(${i})" style="background:var(--red-bg);border:1px solid var(--red);color:var(--red);cursor:pointer;font-size:11px;font-weight:700;padding:4px 10px;border-radius:5px">삭제</button>`}
      </div>`).join('')}
    <div style="border-top:1px solid var(--border);margin:14px 0;padding-top:14px">
      <div style="font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;margin-bottom:10px">새 계정 추가</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
        <input type="text" class="fi" id="acc-id" placeholder="아이디">
        <input type="text" class="fi" id="acc-name" placeholder="이름">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
        <input type="text" class="fi" id="acc-pw" placeholder="비밀번호">
        <select class="fi" id="acc-role" style="background:#fff;color:#111">
          <option value="admin">관리자 (데이터 수정 가능)</option>
          <option value="master">마스터 관리자 (모든 권한)</option>
          <option value="user">일반 사용자 (조회만)</option>
        </select>
      </div>
      <button class="btn bbp btn-full" onclick="addAccount()">+ 계정 추가</button>
    </div>`;
}
function addAccount(){
  if(!isMaster()){tst('권한이 없습니다');return;}
  const id=document.getElementById('acc-id')?.value?.trim()||'';
  const name=document.getElementById('acc-name')?.value?.trim()||'';
  const pw=document.getElementById('acc-pw')?.value||'';
  const role=document.getElementById('acc-role')?.value||'admin';
  if(!id||!name||!pw){tst('아이디·이름·비밀번호를 모두 입력해주세요');return;}
  if(accounts.find(a=>a.id===id)){tst('이미 존재하는 아이디입니다');return;}
  accounts.push({id,name,pw,role});
  saveAccounts();
  tst('✓ '+name+' ('+roleName(role)+') 계정 추가됨');
  renderAccountMgr();
}
function delAccount(i){
  if(!isMaster()){tst('권한이 없습니다');return;}
  const a=accounts[i];if(!a)return;
  if(a.role==='master'&&accounts.filter(x=>x.role==='master').length<=1){
    tst('마지막 마스터 계정은 삭제할 수 없습니다');return;
  }
  if(!confirm(a.name+' ('+a.id+') 계정을 삭제하시겠습니까?'))return;
  accounts.splice(i,1);saveAccounts();
  if(curUser&&curUser.id===a.id){curUser=null;saveCurUser();}
  tst(a.name+' 계정 삭제됨');
  renderAccountMgr();render();
}
// 비밀번호 변경 (본인)
function changeMyPw(){
  if(!curUser){tst('로그인이 필요합니다');return;}
  const np=prompt('새 비밀번호를 입력하세요');
  if(np===null)return;
  if(!np.trim()){tst('비밀번호가 비어 있습니다');return;}
  const acc=accounts.find(a=>a.id===curUser.id);
  if(acc){acc.pw=np;saveAccounts();tst('✓ 비밀번호가 변경되었습니다');}
}


// Firebase 동기화 로드
window.fbSyncLoad = function() {
  if(!window.fbLoad) return;
  window.fbLoad('sr/inv').then(function(fbInv) {
    if(fbInv && Array.isArray(fbInv) && fbInv.length > 0) {
      inv = fbInv;
      localStorage.setItem('sr-inv', JSON.stringify(inv));
    }
    return window.fbLoad('sr/txs');
  }).then(function(fbTxs) {
    if(fbTxs && Array.isArray(fbTxs) && fbTxs.length > 0) {
      txs = fbTxs;
      localStorage.setItem('sr-tx', JSON.stringify(txs));
    }
    render(); dots(); tst('☁️ 클라우드 데이터 로드 완료');
  }).catch(function(e){ console.error('동기화 오류:',e); });
};
tick();setInterval(tick,30000);render();
// Firebase 데이터 로드
setTimeout(function(){ if(window.fbSyncLoad) window.fbSyncLoad(); }, 500);

document.addEventListener('click',function(e){
  if(e.target&&(e.target.tagName==='INPUT')&&
    (e.target.type==='number'||e.target.type==='text'||e.target.type==='date')){
    e.target.select();
  }
});
