<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>삼성SR 재고관리 시스템</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;600;700&display=swap');
:root{  --bg:#f0f2f8;--bg2:#ffffff;--bg3:#e8ecf5;--bg4:#dde2f0;
  --border:#cdd3e8;--border2:#b8c0d8;
  --text:#1a1f35;--text2:#4a5270;--text3:#8090b8;
  --blue:#1a6bff;--blue-bg:rgba(26,107,255,0.10);
  --green:#0d9e72;--green-bg:rgba(13,158,114,0.10);
  --amber:#c07800;--amber-bg:rgba(192,120,0,0.10);
  --red:#d42048;--red-bg:rgba(212,32,72,0.10);
  --purple:#6d4fcf;--purple-bg:rgba(109,79,207,0.10);
  --sidebar:240px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;display:flex;flex-direction:column}
input,button,select{font-family:inherit}

/* 상단바 - 삼성SR 밝은 프리미엄 디자인 */
.topbar{height:72px;display:flex;align-items:center;padding:0 20px;gap:14px;position:fixed;top:0;left:0;right:0;z-index:100;
  background:linear-gradient(135deg,#ffffff 0%,#eef2fc 55%,#e3e9fb 100%);
  border-bottom:1px solid var(--border);
  box-shadow:0 2px 12px rgba(26,107,255,0.06);
  background-image:linear-gradient(135deg,#ffffff 0%,#eef2fc 55%,#e3e9fb 100%),linear-gradient(rgba(26,107,255,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(26,107,255,0.04) 1px,transparent 1px);
  background-size:auto,28px 28px,28px 28px}
.topbar-center{position:absolute;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:14px}
.topbar-brand{display:flex;align-items:center;gap:13px;background:linear-gradient(135deg,#ffffff,#f3f6ff);border:1px solid var(--border2);border-radius:12px;padding:9px 18px;box-shadow:0 2px 10px rgba(26,107,255,0.10),inset 0 1px 0 rgba(255,255,255,0.9)}
.star-badge{display:flex;flex-shrink:0;filter:drop-shadow(0 0 8px rgba(245,170,0,.4))}
.brand-text{font-family:'Orbitron',sans-serif;font-size:21px;font-weight:900;letter-spacing:.06em;
  background:linear-gradient(135deg,#1a4ec0,#1a6bff);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.topbar-sub{font-family:'Black Han Sans',sans-serif;font-size:24px;letter-spacing:.04em;color:var(--text)}
.topbar-right{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:6px;font-size:13px}
.topbar-right-row{display:flex;align-items:center;gap:10px}
.topbar-time{font-family:monospace;font-size:12px;color:var(--text3)}

/* 레이아웃 */
.layout{display:flex;margin-top:72px;min-height:calc(100vh - 72px)}

/* 사이드바 */
.sidebar{width:var(--sidebar);background:var(--bg2);border-right:1px solid var(--border);position:fixed;top:72px;left:0;bottom:0;overflow-y:auto;padding:16px 12px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;color:var(--text2);font-size:14px;font-weight:500;transition:all .15s;border:none;background:none;width:100%;text-align:left;margin-bottom:2px}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.on{background:var(--blue-bg);color:var(--blue);border:1px solid rgba(26,107,255,.2)}
.nav-item svg{width:18px;height:18px;stroke-width:1.8;flex-shrink:0}
.nav-dot{width:7px;height:7px;background:var(--red);border-radius:50%;margin-left:auto;flex-shrink:0}
.nav-section{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;padding:14px 12px 6px;margin-top:4px}
.sidebar-footer{position:absolute;bottom:0;left:0;right:0;padding:12px;border-top:1px solid var(--border);background:var(--bg2)}
.inv-count{font-size:11px;color:var(--text3);text-align:center}

/* 메인 */
.main{margin-left:var(--sidebar);flex:1;padding:24px;min-height:calc(100vh - 72px)}
.page-title{font-size:20px;font-weight:700;margin-bottom:4px}
.page-sub{font-size:13px;color:var(--text3);margin-bottom:20px}

/* 통계 카드 */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px 20px}
.stat-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.stat-val{font-size:28px;font-weight:700;font-family:monospace;line-height:1;margin-bottom:4px}
.stat-label{font-size:12px;color:var(--text3)}

/* 카드 */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px 20px;margin-bottom:16px}
.card-title{font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px}

/* 테이블 */
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;padding:10px 14px;font-size:12px;font-weight:600;color:var(--text3);border-bottom:1px solid var(--border);white-space:nowrap}
.tbl td{padding:11px 14px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--bg3)}
.tbl tr{cursor:pointer;transition:background .1s}

/* 뱃지 */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.bg{background:var(--green-bg);color:var(--green)}
.ba{background:var(--amber-bg);color:var(--amber)}
.br{background:var(--red-bg);color:var(--red)}
.bb{background:var(--blue-bg);color:var(--blue)}
.bgr{background:var(--bg3);color:var(--text2)}

/* 2컬럼 그리드 */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:16px}

/* 폼 */
.fg{margin-bottom:14px}
.fl{font-size:12px;color:var(--text2);font-weight:600;margin-bottom:6px;display:block}
.fi{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 13px;color:var(--text);font-size:14px;outline:none;transition:border-color .15s;-webkit-appearance:none}
.fi:focus{border-color:var(--blue)}
.fi::placeholder{color:var(--text3)}
select.fi option{background:#fff;color:#111}
.btn{padding:10px 20px;border-radius:8px;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .15s;display:inline-flex;align-items:center;gap:6px}
.btn:active{opacity:.8}
.btn-full{width:100%;justify-content:center}
.bbl{background:var(--blue);color:#fff}
.bbg{background:var(--green);color:#0f1117}
.bbr{background:var(--red);color:#fff}
.bbp{background:var(--purple);color:#fff}
.bba{background:var(--amber);color:#0f1117}
.btn-row{display:flex;gap:10px;margin-top:4px}

/* 검색 */
.search-wrap{position:relative;margin-bottom:14px}
.search-wrap input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 14px 10px 38px;color:var(--text);font-size:14px;outline:none;transition:border-color .15s}
.search-wrap input:focus{border-color:var(--blue)}
.search-wrap input::placeholder{color:var(--text3)}
.sic{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}

/* 필터 탭 */
.ftabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.ftab{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .15s}
.ftab.on{background:var(--blue);border-color:var(--blue);color:#fff}

/* 모달 */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:none;align-items:center;justify-content:center}
.ov.on{display:flex}
.mo{background:var(--bg2);border:1px solid var(--border);border-radius:16px;width:520px;max-width:90vw;padding:24px;animation:fadeIn .2s ease;max-height:92vh;overflow-y:auto}
@keyframes fadeIn{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
.mo-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.mo-title{font-size:17px;font-weight:700}
.mo-close{background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer;padding:4px 8px;border-radius:6px}
.mo-close:hover{background:var(--bg3);color:var(--text)}

/* 토스트 */
.toast{position:fixed;bottom:24px;right:24px;background:var(--bg4);border:1px solid var(--border2);color:var(--text);padding:11px 20px;border-radius:10px;font-size:13px;font-weight:500;z-index:300;display:none;box-shadow:0 4px 20px rgba(0,0,0,.4)}

/* 입출고 모드 탭 */
.io-tabs{display:flex;gap:8px;margin-bottom:18px}
.io-tab{flex:1;padding:12px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:7px}
.io-tab svg{width:18px;height:18px}
.io-tab.on{border-color:var(--blue);background:var(--blue-bg);color:var(--blue)}

/* 업로드 존 */
.uzn{background:var(--bg3);border:2px dashed var(--border2);border-radius:10px;padding:28px;text-align:center;cursor:pointer;transition:all .15s}
.uzn:hover{border-color:var(--blue);background:var(--blue-bg)}
.uzn input{display:none}

/* 진행바 */
.pb{background:var(--bg3);border-radius:4px;height:7px;overflow:hidden;margin-top:5px}
.pf{height:7px;border-radius:4px}

/* 알림 행 */
.al-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.al-row:last-child{border-bottom:none}
.al-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}

/* 생산계획 */
.plan-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border)}
.plan-row:last-child{border-bottom:none}
.plan-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--blue);cursor:pointer;flex-shrink:0}
.qi{width:90px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-size:13px;font-weight:600;text-align:center;outline:none;font-family:monospace;flex-shrink:0}
.qi:focus{border-color:var(--blue)}

/* 미리보기 행 */
.prr{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px}
.prr:last-child{border-bottom:none}

/* 경고 박스 */
.warn-box{background:var(--red-bg);border:1px solid rgba(244,63,94,.3);border-radius:8px;padding:12px 16px;font-size:13px;color:var(--red);margin-bottom:14px}
.info-box{background:var(--blue-bg);border:1px solid rgba(26,107,255,.3);border-radius:8px;padding:12px 16px;font-size:13px;color:var(--blue);margin-bottom:14px}
</style>
<!-- SheetJS: xlsx/xls 파일 읽기용 -->
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<!-- Firebase SDK (compat) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script>
  firebase.initializeApp({
    apiKey: "AIzaSyDGpgZjm93dFY9zGe9V5wVox3H9t0bMpCQ",
    authDomain: "samsumgsr-b2757.firebaseapp.com",
    databaseURL: "https://samsumgsr-b2757-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "samsumgsr-b2757",
    storageBucket: "samsumgsr-b2757.firebasestorage.app",
    messagingSenderId: "449863357286",
    appId: "1:449863357286:web:92523856a21e6942faeea7"
  });
  var _db = firebase.database();
  var _st = firebase.storage();

  // Firebase 키에서 특수문자 제거
  function cleanFbKey(str) {
    return String(str||'').replace(/[.#$\/\[\]]/g,'_');
  }
  // 객체의 모든 키를 정제
  function cleanObjKeys(obj) {
    if(!obj || typeof obj !== 'object') return obj;
    if(Array.isArray(obj)) return obj.map(function(item){ return cleanObjKeys(item); });
    var out = {};
    Object.keys(obj).forEach(function(k){
      out[cleanFbKey(k)] = cleanObjKeys(obj[k]);
    });
    return out;
  }
  window.fbSave = function(key, data) {
    var cleanData = (typeof data === 'object' && data !== null) ? cleanObjKeys(data) : data;
    return _db.ref(key).set(cleanData).catch(function(e){ console.error('FB저장오류:',e); });
  };
  window.fbLoad = function(key) {
    return _db.ref(key).get().then(function(s){ return s.exists()?s.val():null; }).catch(function(){ return null; });
  };
  window.fbWatch = function(key, cb) {
    _db.ref(key).on('value', function(s){ if(s.exists()) cb(s.val()); });
  };
  window.fbUploadFile = function(file, path) {
    return _st.ref(path).put(file).then(function(snap){ return snap.ref.getDownloadURL(); }).catch(function(){ return null; });
  };
  window.fbGetFileURL = function(path) {
    return _st.ref(path).getDownloadURL().catch(function(){ return null; });
  };
</script>
</head>
<body>

<!-- 상단바 -->
<div class="topbar">
  <div class="topbar-center">
    <div class="topbar-brand">
      <div class="star-badge">
        <svg width="40" height="40" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#FFD24A" stop-opacity="0.5"/>
              <stop offset="100%" stop-color="#F5AA00" stop-opacity="0"/>
            </radialGradient>
          </defs>
          <circle cx="50" cy="50" r="44" stroke="#F0A800" stroke-width="5" fill="rgba(245,170,0,0.08)"/>
          <circle cx="50" cy="50" r="44" fill="url(#centerGlow)"/>
          <polygon points="50.0,8.0 55.0,22.1 70.0,22.5 58.1,31.6 62.3,46.0 50.0,37.5 37.7,46.0 41.9,31.6 30.0,22.5 45.0,22.1" fill="#F0A800"/>
          <polygon points="27.0,40.0 32.0,54.1 47.0,54.5 35.1,63.6 39.3,78.0 27.0,69.5 14.7,78.0 18.9,63.6 7.0,54.5 22.0,54.1" fill="#F0A800"/>
          <polygon points="73.0,40.0 78.0,54.1 93.0,54.5 81.1,63.6 85.3,78.0 73.0,69.5 60.7,78.0 64.9,63.6 53.0,54.5 68.0,54.1" fill="#F0A800"/>
        </svg>
      </div>
      <span class="brand-text">SAMSUNG S.R</span>
    </div>
    <div class="topbar-sub">재고관리 시스템</div>
  </div>
  <div class="topbar-right">
    <div class="topbar-right-row">
      <div id="top-status" style="display:flex;gap:8px"></div>
      <div id="top-auth" style="display:flex;align-items:center;gap:8px"></div>
      <span id="jb-sync" style="font-size:11px;color:#888">🔄 연결 중...</span>
      <button onclick="_jbPull()" style="background:rgba(26,107,255,.1);border:1px solid rgba(26,107,255,.3);color:#1a6bff;border-radius:6px;padding:4px 10px;font-size:11px;font-weight:600;cursor:pointer">🔄 새로고침</button>
    </div>
    <div class="topbar-time" id="tt"></div>
  </div>
</div>

<!-- 레이아웃 -->
<div class="layout">

  <!-- 사이드바 -->
  <aside class="sidebar">
    <div class="nav-section">메뉴</div>
    <button class="nav-item on" onclick="go('dash')" id="nb-dash">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
      대시보드
    </button>
    <button class="nav-item" onclick="go('inv')" id="nb-inv">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5M12 22V12"/></svg>
      재고 조회
    </button>
    <button class="nav-item" onclick="go('io')" id="nb-io">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg>
      입출고 등록
    </button>
    <button class="nav-item" onclick="go('alert')" id="nb-alert">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
      재고 알림
      <span id="aldot" class="nav-dot" style="display:none"></span>
    </button>
    <button class="nav-item" onclick="go('plan')" id="nb-plan">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      생산계획서
      <span id="pldot" class="nav-dot" style="display:none"></span>
    </button>
    <button class="nav-item" onclick="go('order')" id="nb-order">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>
      발주서
    </button>
    <button class="nav-item" onclick="go('pstat')" id="nb-pstat">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 3v18h18"/><rect x="7" y="11" width="3" height="6" rx="0.5"/><rect x="12" y="7" width="3" height="10" rx="0.5"/><rect x="17" y="13" width="3" height="4" rx="0.5"/></svg>
      생산자별 현황
    </button>
    <div class="nav-section">관리</div>
    <button class="nav-item" onclick="go('addprod')" id="nb-addprod">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><line x1="12" y1="9" x2="12" y2="15"/><line x1="9" y1="12" x2="15" y2="12"/></svg>
      제품추가
    </button>
    <button class="nav-item" onclick="go('barcode')" id="nb-barcode">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><line x1="14" y1="14" x2="14" y2="14"/><line x1="14" y1="17.5" x2="14" y2="17.5"/><line x1="17.5" y1="14" x2="17.5" y2="14"/><line x1="21" y1="14" x2="21" y2="14"/><line x1="17.5" y1="17.5" x2="17.5" y2="17.5"/><line x1="21" y1="21" x2="21" y2="21"/><line x1="14" y1="21" x2="14" y2="21"/><line x1="17.5" y1="21" x2="17.5" y2="21"/><line x1="21" y1="17.5" x2="21" y2="17.5"/></svg>
      제품 태그 출력
    </button>
    <button class="nav-item" onclick="go('set')" id="nb-set">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"/><path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      설정 / 업로드

function fileIcon(type,name){
  type=type||'';name=(name||'').toLowerCase();
  if(type.startsWith('image/'))return '🖼️';
  if(type==='application/pdf'||name.endsWith('.pdf'))return '📕';
  if(/word|\.docx?$/.test(type+name))return '📘';
  if(/excel|sheet|\.xlsx?$|\.csv$/.test(type+name))return '📗';
  if(/powerpoint|presentation|\.pptx?$/.test(type+name))return '📙';
  if(/zip|rar|7z|\.zip$|\.rar$/.test(type+name))return '🗜️';
  if(/dwg|dxf|step|stp|iges|igs|\.dwg$|\.dxf$/.test(type+name))return '📐';
  return '📄';
}

function _jbStatus(msg,color){
  const el=document.getElementById('jb-sync');
  if(el){el.textContent=msg;el.style.color=color||'#888';}
}

async function _jbFetch(id,method,data){
  try{
    const url='https://api.jsonbin.io/v3/b/'+id+(method==='GET'?'/latest':'');
    const headers={'X-Master-Key':JBIN_KEY,'X-Access-Key':JBIN_KEY};
    if(method!=='GET')headers['Content-Type']='application/json';
    const opts={method:method,headers:headers};
    if(method!=='GET')opts.body=JSON.stringify(data);
    const r=await fetch(url,opts);
    if(!r.ok){console.error('JSONBin error:',r.status,id);return null;}
    const d=await r.json();
    return method==='GET'?d.record:d;
  }catch(e){console.error('JSONBin fetch error:',e);return null;}
}

// 파일 업로드 처리 - 사진은 이미지만, 도면은 모든 파일 허용
function handleImgUpload(itemId,kind,inputEl){
  if(!requireEdit()){inputEl.value='';return;}
  const file=inputEl.files&&inputEl.files[0];
  if(!file)return;

  // 제품 사진: 이미지만 + 리사이즈
  if(kind==='pic'){
    if(!file.type.startsWith('image/')){tst('제품 사진은 이미지 파일만 업로드할 수 있습니다');return;}
    const reader=new FileReader();
    reader.onload=function(e){
      const img=new Image();
      img.onload=function(){
        const maxW=800;
        let w=img.width,h=img.height;
        if(w>maxW||h>maxW){const r=Math.min(maxW/w,maxW/h);w=Math.round(w*r);h=Math.round(h*r);}
        const cv=document.createElement('canvas');cv.width=w;cv.height=h;
        cv.getContext('2d').drawImage(img,0,0,w,h);
        imgs[itemId]=cv.toDataURL('image/jpeg',0.82);
        svImgs();tst('✓ 제품 사진이 저장되었습니다');opD(itemId);
      };
      img.onerror=function(){tst('이미지를 불러올 수 없습니다');};
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
    return;
  }

  // 제품 도면: 이미지/PDF/문서 등 모든 파일 허용
  const isImage=file.type.startsWith('image/');
  // 용량 제한 안내 (localStorage 한계 고려, 약 8MB)
  if(file.size>8*1024*1024){
    tst('⚠️ 파일이 너무 큽니다 (8MB 이하 권장)',2800);
  }
  const reader=new FileReader();
  reader.onload=function(e){
    if(isImage){
      // 이미지 도면은 리사이즈해서 저장
      const img=new Image();
      img.onload=function(){
        const maxW=1400;
        let w=img.width,h=img.height;
        if(w>maxW||h>maxW){const r=Math.min(maxW/w,maxW/h);w=Math.round(w*r);h=Math.round(h*r);}
        const cv=document.createElement('canvas');cv.width=w;cv.height=h;
        cv.getContext('2d').drawImage(img,0,0,w,h);
        draws[itemId]={type:file.type,name:file.name,data:cv.toDataURL('image/jpeg',0.85),isImage:true};
        try{svImgs();}catch(err){tst('⚠️ 저장공간 부족 - 더 작은 파일을 사용해주세요',3000);return;}
        tst('✓ 도면이 저장되었습니다');opD(itemId);
      };
      img.onerror=function(){tst('이미지를 불러올 수 없습니다');};
      img.src=e.target.result;
    }else{
      // PDF·문서 등은 원본 그대로 base64 저장
      draws[itemId]={type:file.type,name:file.name,data:e.target.result,isImage:false};
      try{svImgs();}catch(err){tst('⚠️ 저장공간 부족 - 더 작은 파일을 사용해주세요',3000);return;}
      tst('✓ 도면 ('+file.name+') 저장되었습니다');opD(itemId);
    }
  };
  reader.onerror=function(){tst('파일을 읽을 수 없습니다');};
  reader.readAsDataURL(file);
}

function prodBadge(it){
  var today=new Date().toLocaleDateString('ko',{year:'2-digit',month:'short',day:'numeric'});
  if(it.prodStatus==='stop'){
    var dt=' · '+(it.prodStop?new Date(it.prodStop).toLocaleDateString('ko',{year:'2-digit',month:'short',day:'numeric'}):today);

  }

  var last=txs.filter(function(t){return t.iid===it.id&&t.type==='in';}).sort(function(a,b){return b.ts-a.ts;})[0];
  if(!last||(Date.now()-last.ts)>365*24*60*60*1000) return '<span class="badge br">중단 · '+today+'</span>';
  return '<span class="badge bg">생산중</span>';

function cats(){return['전체',...new Set(inv.map(i=>i.cat))];}
function isStop(it){
  // 중단 여부 판단 (prodBadge 로직과 동일)
  if(it.prodStatus==='stop') return true;
  if(it.prodStatus==='active') return false;
  var last=txs.filter(function(t){return t.iid===it.id&&t.type==='in';}).sort(function(a,b){return b.ts-a.ts;})[0];
  return !last||(Date.now()-last.ts)>365*24*60*60*1000;
}
function fil(){
  // 상태별 정렬 우선순위: 부족(0) > 주의(1) > 정상(2)
  const stOrder={low:0,med:1,ok:2};
  return inv.filter(i=>{
    const stop=isStop(i);
    const stOk = fcat==='전체'||(fcat==='정상'&&st(i)==='ok'&&!stop)||(fcat==='주의'&&st(i)==='med'&&!stop)||(fcat==='부족'&&st(i)==='low'&&!stop)||(fcat==='생산중단'&&stop);
    const srOk = !sq||i.name.includes(sq)||i.id.includes(sq)||(i.material||'').includes(sq)||(i.classNo||'').includes(sq)||(i.location||'').includes(sq);
    return stOk&&srOk;
  }).sort((a,b)=>{
    // 중단 품목 하단
    const stopA=isStop(a),stopB=isStop(b);
    if(stopA!==stopB) return stopA?1:-1;
    const sa=stOrder[st(a)],sb=stOrder[st(b)];
    if(sa!==sb)return sa-sb;
    return a.qty-b.qty;
  });
}

// 직접입력 모드의 품목 검색 (금형번호/부품번호로 자동 매칭)
let manIOSelected={in:null,out:null};
function findItem(type,val){
  val=(val||'').trim();
  const info=document.getElementById(type==='in'?'ii-info':'oi-info');
  if(!val){info.style.display='none';manIOSelected[type]=null;return;}
  // 정확히 일치 우선 (금형번호 또는 부품번호)
  let it=inv.find(i=>i.id===val||i.classNo===val||i.barcode===val);
  // 정확 일치 없으면 부분 일치 - 1개만 매칭되면 자동 선택
  if(!it){
    const matches=inv.filter(i=>i.id.includes(val)||(i.classNo||'').includes(val));
    if(matches.length===1)it=matches[0];
    else if(matches.length>1){
      info.style.display='block';
      info.style.background='var(--bg3)';
      info.style.borderColor='var(--border)';
      info.style.color='var(--text2)';
      info.innerHTML=`<strong style="color:var(--blue)">${matches.length}건 일치</strong> · 정확한 금형/부품번호를 입력하세요<br><span style="font-size:11px">${matches.slice(0,3).map(m=>`${m.id} (${m.name})`).join(', ')}${matches.length>3?' 외':''}</span>`;
      manIOSelected[type]=null;return;
    }
  }
  if(it){
    manIOSelected[type]=it.id;
    info.style.display='block';
    info.style.background=type==='in'?'var(--green-bg)':'var(--amber-bg)';
    info.style.borderColor=type==='in'?'var(--green)':'var(--amber)';
    info.style.color='var(--text)';
    const stColor=st(it)==='low'?'var(--red)':st(it)==='med'?'var(--amber)':'var(--green)';
    info.innerHTML=`<div style="font-weight:700;font-size:14px;margin-bottom:3px">✓ ${it.name}</div>

function doIO2(type){

  // 담당자 미설정/잘못된 경우 현재 로그인 사용자로 자동 설정

// 통합 파일 리더: .xls/.xlsx/.csv 모두 지원 + 형식 자동 감지
function rdIOFile(file){
  if(!file){tst('파일이 선택되지 않았습니다');return;}
  console.log('[엑셀업로드] 파일:',file.name,'크기:',file.size,'타입:',file.type);
  const ext=(file.name.split('.').pop()||'').toLowerCase();

  // SheetJS로 읽기 (xls, xlsx). SheetJS 미로드 시 텍스트로 폴백
  const tryAsSheet=(ext==='xls'||ext==='xlsx')&&(typeof XLSX!=='undefined');
  const reader=new FileReader();

  if(tryAsSheet){
    reader.onload=function(e){
      try{
        const data=new Uint8Array(e.target.result);
        console.log('[엑셀업로드] SheetJS 시도, 바이트:',data.length);
        const wb=XLSX.read(data,{type:'array',raw:false});
        console.log('[엑셀업로드] 시트:',wb.SheetNames);
        const ws=wb.Sheets[wb.SheetNames[0]];
        const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:'',raw:false});
        console.log('[엑셀업로드] 파싱된 행:',rows.length);
        if(rows.length===0){
          tst('⚠️ 파일에 데이터가 없습니다',3000);return;
        }
        processIOData(rows,file.name);
      }catch(err){
        console.warn('[엑셀업로드] SheetJS 실패, 텍스트 재시도:',err.message);
        readAsTextFallback(file);
      }
    };
    reader.onerror=function(){tst('❌ 파일 읽기 실패',3000);};
    reader.readAsArrayBuffer(file);
  }else{
    if((ext==='xls'||ext==='xlsx')&&typeof XLSX==='undefined'){
      console.warn('[엑셀업로드] XLSX 라이브러리 미로드 - 텍스트 모드로 시도');
      tst('⚠️ 엑셀 라이브러리 미로드 · 텍스트로 시도합니다',2500);
    }
    readAsTextFallback(file);
  }
}

// 텍스트 모드 폴백 (UTF-8 → UTF-16 순서)
function readAsTextFallback(file){
  const r=new FileReader();
  r.onload=function(e){
    const txt=e.target.result||'';
    // 첫 글자가 깨졌으면 UTF-16일 가능성
    const looksBinary=txt.length>0&&(txt.charCodeAt(0)===0xFFFE||txt.charCodeAt(0)===0xFEFF||/[\x00-\x08]/.test(txt.slice(0,100)));
    if(looksBinary){
      const r2=new FileReader();
      r2.onload=function(e2){
        try{tryReadAsText(e2.target.result,file.name);}
        catch(e3){tst('❌ 파일을 읽을 수 없습니다',3500);console.error(e3);}
      };
      r2.readAsText(file,'utf-16le');
    }else{
      try{tryReadAsText(txt,file.name);}
      catch(err){
        console.warn('[엑셀업로드] UTF-8 실패, UTF-16 시도');
        const r2=new FileReader();
        r2.onload=function(e2){
          try{tryReadAsText(e2.target.result,file.name);}
          catch(e3){tst('❌ 파일을 읽을 수 없습니다: '+e3.message,3500);}
        };
        r2.readAsText(file,'utf-16le');
      }
    }
  };
  r.onerror=function(){tst('❌ 파일 읽기 실패',3000);};
  r.readAsText(file,'utf-8');
}

// 텍스트(CSV 또는 TSV) → 행 배열로 변환 후 처리
function tryReadAsText(text,fileName){
  text=(text||'').replace(/^\uFEFF/,'');
  // 탭이 더 많으면 TSV로 판단, 아니면 CSV
  const tabCount=(text.match(/\t/g)||[]).length;
  const commaCount=(text.match(/,/g)||[]).length;
  const isTab=tabCount>commaCount;
  const sep=isTab?'\t':',';
  const lines=text.trim().split(/\r?\n/);
  const rows=lines.map(line=>{
    // CSV 따옴표 처리 (간단 버전 - 따옴표로 감싸진 필드의 쉼표는 보존)
    if(!isTab&&line.includes('"')){
      const out=[];let cur='',inQ=false;
      for(let i=0;i<line.length;i++){
        const ch=line[i];
        if(ch==='"'){
          if(inQ&&line[i+1]==='"'){cur+='"';i++;}
          else inQ=!inQ;
        }else if(ch===sep&&!inQ){out.push(cur);cur='';}
        else cur+=ch;
      }
      out.push(cur);
      return out.map(c=>c.trim());
    }
    return line.split(sep).map(c=>c.trim().replace(/^"|"$/g,''));
  });
  processIOData(rows,fileName);
}

// 행 배열을 받아 형식 자동 감지 후 처리
function processIOData(rows,fileName){
  if(!rows||!rows.length){tst('파일에 데이터가 없습니다');return;}
  // 헤더 행 확인
  const header=rows[0].map(c=>String(c||'').trim());
  const headerStr=header.join(' ').toLowerCase();
  // 볼보 형식 감지: "material no" + "order qty" 또는 "po number" 포함
  const isVolvo=(headerStr.includes('material no')||headerStr.includes('material_no'))
                &&(headerStr.includes('order qty')||headerStr.includes('order_qty'));
  // 일반 양식 감지: 첫 열에 "구분"
  const isGeneral=header[0]==='구분';

  let parsed=[];

  if(isVolvo){
    // 볼보 형식: 컬럼 인덱스 찾기
    const idxMaterial=header.findIndex(h=>/material\s*no/i.test(h));
    const idxOrderQty=header.findIndex(h=>/order\s*qty/i.test(h));
    const idxPO=header.findIndex(h=>/po\s*number/i.test(h));
    const idxDesc=header.findIndex(h=>/material\s*desc/i.test(h));
    const idxOrderDate=header.findIndex(h=>/order\s*date/i.test(h));
    const idxDelivery=header.findIndex(h=>/delivery\s*date/i.test(h));
    const idxRemain=header.findIndex(h=>String(h).includes('발주잔량'));
    const idxRcv=header.findIndex(h=>String(h).includes('입고수량'));

    for(let i=1;i<rows.length;i++){
      const r=rows[i];if(!r||!r[idxMaterial])continue;
      const matNo=String(r[idxMaterial]).trim();
      const qty=parseInt(String(r[idxOrderQty]||'').replace(/[^\d-]/g,''))||0;
      if(!matNo||qty<=0)continue;
      parsed.push({
        type:'out', // 볼보 출고 데이터는 모두 출고
        matNo, // 부품번호로 매칭
        qty,
        po:idxPO>=0?String(r[idxPO]||''):'',
        desc:idxDesc>=0?String(r[idxDesc]||''):'',
        orderDate:idxOrderDate>=0?String(r[idxOrderDate]||''):'',
        delivery:idxDelivery>=0?String(r[idxDelivery]||''):'',
        remain:idxRemain>=0?String(r[idxRemain]||''):'',
        rcv:idxRcv>=0?String(r[idxRcv]||''):'',
        format:'volvo'
      });
    }
  }else if(isGeneral){
    // 일반 형식: 구분,품목코드,수량,담당자,메모
    for(let i=1;i<rows.length;i++){
      const r=rows[i];if(!r||!r[0]||!r[1])continue;
      const type=r[0]==='입고'?'in':'out';
      const iid=String(r[1]).trim();
      const qty=parseInt(r[2])||0;
      if(!iid||qty<=0)continue;
      parsed.push({type,iid,qty,w:r[3]||'',memo:r[4]||'',format:'general'});
    }
  }else{
    // 헤더 없이 그대로 시도 - 첫 열이 입고/출고면 일반 형식으로 처리
    for(let i=0;i<rows.length;i++){
      const r=rows[i];if(!r||!r[0]||!r[1])continue;
      const v=String(r[0]).trim();
      if(v!=='입고'&&v!=='출고')continue;
      const type=v==='입고'?'in':'out';
      const iid=String(r[1]).trim();
      const qty=parseInt(r[2])||0;
      if(!iid||qty<=0)continue;
      parsed.push({type,iid,qty,w:r[3]||'',memo:r[4]||'',format:'general'});
    }
  }

  // 빈 파싱 결과면 알림만 띄우고 종료 (헤더만 있는 파일 등)
  if(!parsed.length){
    tst('⚠️ 인식 가능한 데이터 행이 없습니다. 파일 형식을 확인해주세요',3500);
    return;
  }

  // 재고 매칭
  const valid=[],bad=[];
  parsed.forEach(r=>{
    let it=null;
    if(r.format==='volvo'){
      // 볼보 형식은 Material No. → 부품번호(classNo)로 매칭
      it=inv.find(i=>i.classNo===r.matNo||i.barcode===r.matNo||i.id===r.matNo);
      if(it){
        valid.push({type:'out',iid:it.id,qty:r.qty,w:'',
          memo:`[볼보출고] PO:${r.po} · ${r.desc}${r.orderDate?' · 발주일 '+r.orderDate:''}${r.delivery?' · 납기 '+r.delivery:''}`,
          nm:it.name,unit:it.unit,matNo:r.matNo,po:r.po,format:'volvo'});
      }else bad.push({...r,reason:'부품번호('+r.matNo+') 없음'});
    }else{
      it=inv.find(i=>i.id===r.iid);
      if(it)valid.push({...r,nm:it.name,unit:it.unit});
      else bad.push({...r,reason:'품목코드('+r.iid+') 없음'});
    }
  });

  pendIO=valid;

  // ★ 새 DOM 구조: io-empty 숨기고 io-content 표시
  const emptyDiv=document.getElementById('io-empty');
  const contentDiv=document.getElementById('io-content');
  const fileInfoDiv=document.getElementById('io-fileinfo');
  if(emptyDiv)emptyDiv.style.display='none';
  if(contentDiv)contentDiv.style.display='block';

  // 좌측 카드의 파일 정보 표시
  if(fileInfoDiv){
    fileInfoDiv.style.display='block';
    const formatTxt=isVolvo?'📦 볼보 출고 형식':(isGeneral?'📄 일반 입출고 양식':'📄 데이터 파일');
    document.getElementById('io-filename').textContent=fileName;
    document.getElementById('io-fileformat').innerHTML=`${formatTxt} · 총 <strong>${parsed.length}행</strong> 인식됨`;
  }

  // 총 수량 계산
  const totalQty=valid.reduce((s,r)=>s+(r.qty||0),0);
  const outCount=valid.filter(r=>r.type==='out').length;
  const inCount=valid.filter(r=>r.type==='in').length;

  // 버튼 텍스트
  const btn=document.getElementById('io-abtn');
  if(btn){
    if(valid.length===0){
      btn.innerHTML=`⚠️ 등록 가능한 데이터 없음 (재고 매칭 실패)`;
      btn.className='btn';
      btn.style.background='var(--bg3)';
      btn.style.color='var(--text3)';
      btn.style.cursor='not-allowed';
      btn.disabled=true;
    }else if(isVolvo||(outCount>0&&inCount===0)){
      btn.innerHTML=`⬆️ 출고 등록 (${valid.length}건 · ${totalQty.toLocaleString()}EA 재고 차감)`;
      btn.className='btn bbr btn-full';
      btn.style.cssText='padding:16px;font-size:16px;font-weight:800;justify-content:center';
      btn.disabled=false;
    }else if(inCount>0&&outCount===0){
      btn.innerHTML=`⬇️ 입고 등록 (${valid.length}건 · ${totalQty.toLocaleString()}EA 재고 추가)`;
      btn.className='btn bbg btn-full';
      btn.style.cssText='padding:16px;font-size:16px;font-weight:800;justify-content:center;color:#fff';
      btn.disabled=false;
    }else{
      btn.innerHTML=`✓ 입출고 등록 (입고${inCount}/출고${outCount})`;
      btn.className='btn bbl btn-full';
      btn.style.cssText='padding:16px;font-size:16px;font-weight:800;justify-content:center';
      btn.disabled=false;
    }
  }

  // 통계 카드 (컴팩트 버전)
  document.getElementById('io-stat').innerHTML=`
    <div style="flex:1;min-width:110px;background:#fff;border:1px solid var(--border);border-radius:8px;padding:10px 12px">
      <div style="font-size:10px;color:var(--text3);margin-bottom:3px">총 건수</div>
      <div style="font-size:18px;font-weight:800;color:var(--text)">${valid.length}<span style="font-size:11px;color:var(--text3);font-weight:500"> 건</span></div>
    </div>
    <div style="flex:1;min-width:110px;background:#fff;border:1px solid ${isVolvo||outCount>inCount?'rgba(212,32,72,.3)':'rgba(45,212,160,.3)'};border-radius:8px;padding:10px 12px">
      <div style="font-size:10px;color:${isVolvo||outCount>inCount?'var(--red)':'var(--green)'};margin-bottom:3px">${isVolvo||outCount>inCount?'총 출고 수량':'총 입고 수량'}</div>
      <div style="font-size:18px;font-weight:800;color:${isVolvo||outCount>inCount?'var(--red)':'var(--green)'};font-family:monospace">${valid.length===0?'0':(isVolvo||outCount>inCount?'-':'+')+totalQty.toLocaleString()}</div>
    </div>
    ${bad.length?`<div style="flex:1;min-width:110px;background:var(--red-bg);border:1px solid var(--red);border-radius:8px;padding:10px 12px">
      <div style="font-size:10px;color:var(--red);margin-bottom:3px">⚠️ 매칭 실패</div>
      <div style="font-size:18px;font-weight:800;color:var(--red)">${bad.length}<span style="font-size:11px;font-weight:500"> 건</span></div>
    </div>`:''}`;

  // 매칭 실패 경고 (전체 너비 박스)
  const badBox=document.getElementById('io-bad');
  if(bad.length){
    badBox.style.display='block';
    badBox.innerHTML=`
      <div style="background:var(--red-bg);border:1px solid var(--red);border-radius:8px;padding:12px 16px;margin-bottom:14px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <span style="font-size:18px">⚠️</span>
          <strong style="color:var(--red);font-size:14px">매칭 실패 ${bad.length}건 — 이 행들은 처리되지 않습니다</strong>
        </div>
        <div style="font-size:12px;color:var(--text2);line-height:1.7">
          ${bad.slice(0,5).map(b=>`• ${b.reason}${b.qty?' (수량 '+b.qty+')':''}`).join('<br>')}
          ${bad.length>5?'<br>... 외 '+(bad.length-5)+'건':''}
        </div>
        <div style="margin-top:10px;padding-top:10px;border-top:1px solid rgba(212,32,72,.2);font-size:11px;color:var(--text3)">
          💡 매칭 실패한 부품번호는 먼저 <strong>재고 조회 → 품목 추가</strong> 또는 <strong>설정 → 품목 CSV 업로드</strong>로 등록해주세요.
        </div>
      </div>`;
  }else{
    badBox.style.display='none';
    badBox.innerHTML='';
  }

  // 전체 데이터 테이블 (스크롤로 모든 행 표시)
  document.getElementById('io-rowcount').textContent=`전체 ${valid.length}건`+(bad.length?` (+ 매칭실패 ${bad.length}건)`:'');

  let html='<table class="tbl" style="font-size:12px;width:100%">';
  if(isVolvo){
    html+=`<thead style="position:sticky;top:0;background:var(--bg2);z-index:5">
      <tr>
        <th style="width:40px">#</th>
        <th>구분</th>
        <th>품명</th>
        <th>부품번호</th>
        <th>PO Number</th>
        <th>발주일</th>
        <th>납기일</th>
        <th style="text-align:right">수량</th>
        <th>현재고</th>
      </tr></thead><tbody>`;
    valid.forEach((r,i)=>{
      const itCur=inv.find(x=>x.id===r.iid);
      const curQty=itCur?itCur.qty:0;
      const afterQty=curQty-r.qty;
      html+=`<tr>
        <td style="color:var(--text3);font-family:monospace">${i+1}</td>
        <td><span class="badge ba" style="font-size:10px">출고</span></td>
        <td><strong>${r.nm}</strong></td>
        <td style="font-family:monospace;font-size:11px;color:var(--text2)">${r.matNo}</td>
        <td style="font-family:monospace;font-size:11px;color:var(--blue);font-weight:600">${r.po||'-'}</td>
        <td style="font-family:monospace;font-size:11px;color:var(--text3)">${r.orderDate||'-'}</td>
        <td style="font-family:monospace;font-size:11px;color:var(--text3)">${r.delivery||'-'}</td>
        <td style="text-align:right;font-family:monospace;color:var(--red);font-weight:800;font-size:14px">-${r.qty}<span style="font-size:10px;color:var(--text3);font-weight:400"> ${r.unit}</span></td>
        <td style="font-family:monospace;font-size:11px">
          <span style="color:var(--text2)">${curQty}</span>
          <span style="color:var(--text3)"> → </span>
          <span style="color:${afterQty<0?'var(--red)':'var(--text)'};font-weight:700">${afterQty}</span>
        </td>
      </tr>`;
    });
    // 매칭 실패 행도 회색으로 표시
    bad.forEach((r,i)=>{
      html+=`<tr style="background:rgba(212,32,72,.05);opacity:.6">
        <td style="color:var(--text3);font-family:monospace">${valid.length+i+1}</td>
        <td><span class="badge br" style="font-size:10px">실패</span></td>
        <td style="color:var(--text3)">${r.desc||'-'}</td>
        <td style="font-family:monospace;font-size:11px;color:var(--red)">${r.matNo||'-'}</td>
        <td style="font-family:monospace;font-size:11px;color:var(--text3)">${r.po||'-'}</td>
        <td style="font-family:monospace;font-size:11px;color:var(--text3)">${r.orderDate||'-'}</td>
        <td style="font-family:monospace;font-size:11px;color:var(--text3)">${r.delivery||'-'}</td>
        <td style="text-align:right;font-family:monospace;color:var(--text3)">${r.qty||0}</td>
        <td style="font-size:11px;color:var(--red)">매칭 안됨</td>
      </tr>`;
    });
    html+='</tbody></table>';
  }else{
    html+=`<thead style="position:sticky;top:0;background:var(--bg2);z-index:5">
      <tr>
        <th style="width:40px">#</th>
        <th>구분</th>
        <th>품명</th>
        <th>품목코드</th>
        <th style="text-align:right">수량</th>
        <th>현재고</th>
        <th>메모</th>
      </tr></thead><tbody>`;
    valid.forEach((r,i)=>{
      const itCur=inv.find(x=>x.id===r.iid);
      const curQty=itCur?itCur.qty:0;
      const afterQty=r.type==='in'?curQty+r.qty:curQty-r.qty;
      const isOut=r.type==='out';
      html+=`<tr>
        <td style="color:var(--text3);font-family:monospace">${i+1}</td>
        <td><span class="badge ${isOut?'ba':'bg'}" style="font-size:10px">${isOut?'출고':'입고'}</span></td>
        <td><strong>${r.nm}</strong></td>
        <td style="font-family:monospace;font-size:11px;color:var(--blue)">${r.iid}</td>
        <td style="text-align:right;font-family:monospace;color:${isOut?'var(--red)':'var(--green)'};font-weight:800;font-size:14px">${isOut?'-':'+'}${r.qty}<span style="font-size:10px;color:var(--text3);font-weight:400"> ${r.unit}</span></td>
        <td style="font-family:monospace;font-size:11px">
          <span style="color:var(--text2)">${curQty}</span>
          <span style="color:var(--text3)"> → </span>
          <span style="color:${afterQty<0?'var(--red)':'var(--text)'};font-weight:700">${afterQty}</span>
        </td>
        <td style="font-size:11px;color:var(--text3)">${r.memo||'-'}</td>
      </tr>`;
    });
    bad.forEach((r,i)=>{
      html+=`<tr style="background:rgba(212,32,72,.05);opacity:.6">
        <td style="color:var(--text3);font-family:monospace">${valid.length+i+1}</td>
        <td><span class="badge br" style="font-size:10px">실패</span></td>
        <td style="color:var(--text3)">-</td>
        <td style="font-family:monospace;font-size:11px;color:var(--red)">${r.iid||r.matNo||'-'}</td>
        <td style="text-align:right;font-family:monospace;color:var(--text3)">${r.qty||0}</td>
        <td style="font-size:11px;color:var(--red)">매칭 안됨</td>
        <td style="font-size:11px;color:var(--text3)">${r.reason||''}</td>
      </tr>`;
    });
    html+='</tbody></table>';
  }
  document.getElementById('io-prows').innerHTML=html;
}

function apIO(){
  if(!requireEdit())return;
  if(!pendIO.length){tst('적용할 데이터가 없습니다');return;}
  let dw=document.getElementById('io-dw')?.value;
  if(!dw||dw==='(관리자 없음)')dw=curUser?curUser.name:'';
  let okIn=0,okOut=0,fail=0,totalInQty=0,totalOutQty=0;
  pendIO.forEach((r,i)=>{
    const idx=inv.findIndex(it=>it.id===r.iid);
    if(idx<0){fail++;return;}
    // 출고 시 음수 허용 (경고 없이 진행 - 재고 즉시 반영)
    if(r.type==='in'){
      inv[idx].qty+=r.qty;
      okIn++;totalInQty+=r.qty;
    }else{
      inv[idx].qty-=r.qty;
      okOut++;totalOutQty+=r.qty;
    }
    const memoPrefix=r.format==='volvo'?'':'[엑셀]';
    txs.unshift({id:Date.now()+i,type:r.type,iid:r.iid,qty:r.qty,w:r.w||dw,ts:Date.now(),memo:memoPrefix+(r.memo||'')});
  });
  sv();pendIO=[];
  // 명확한 결과 메시지
  let msg='✅ 재고 반영 완료 · ';
  const parts=[];
  if(okOut>0)parts.push(`출고 ${okOut}건(-${totalOutQty.toLocaleString()}EA)`);
  if(okIn>0)parts.push(`입고 ${okIn}건(+${totalInQty.toLocaleString()}EA)`);
  msg+=parts.join(' · ');
  if(fail>0)msg+=` · ❌ 실패 ${fail}건`;
  tst(msg,3500);
  go('dash');
}

function doIO(type){
  if(!requireEdit())return;
  const iid=document.getElementById(type==='in'?'ii':'oi').value;
  const qty=parseInt(document.getElementById(type==='in'?'iq':'oq').value);
  const w=document.getElementById(type==='in'?'iw':'ow').value;
  const memo=document.getElementById(type==='in'?'im':'om').value;
  if(!iid){tst('품목을 선택해주세요');return;}
  if(!qty||qty<1){tst('수량을 입력해주세요');return;}
  const idx=inv.findIndex(i=>i.id===iid);
  // 출고 시 재고 부족 경고만 표시 (음수 허용)
  if(type==='out'&&inv[idx].qty<qty){
    if(!confirm(`⚠️ 현재 재고(${inv[idx].qty}${inv[idx].unit})보다 출고 수량이 많습니다.\n재고가 마이너스(${inv[idx].qty-qty}${inv[idx].unit})가 됩니다.\n계속하시겠습니까?`))return;
  }
  if(type==='in')inv[idx].qty+=qty;else inv[idx].qty-=qty;
  txs.unshift({id:Date.now(),type,iid,qty,w,ts:Date.now(),memo});
  sv();tst(type==='in'?`✓ 입고완료 (+${qty}${inv[idx].unit}) · 현재 ${inv[idx].qty}${inv[idx].unit}`:`✓ 출고완료 (-${qty}${inv[idx].unit}) · 현재 ${inv[idx].qty}${inv[idx].unit}`);go('dash');
}

function rPlan(){

          <input type="text" class="fi" id="plan-search" placeholder="품명, 금형번호, 부품번호 검색..." value="${planSq}" style="padding-left:34px" onkeyup="planSearch(this.value)">
        </div>
        <div id="plan-list-box">
        ${(!low.length&&!med.length)?'<div style="text-align:center;padding:24px;color:var(--text3);font-size:13px">검색 결과 없음</div>':''}
        ${low.length?`<div style="font-size:11px;font-weight:600;color:var(--red);text-transform:uppercase;margin-bottom:8px">🔴 부족 (${low.length}종)</div>${low.map(i=>`<div class="plan-row"><input type="checkbox" id="pc-${i.id}" ${planSel[i.id]>0?'checked':''} onchange="tiItem('${i.id}',this.checked)"><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600">${i.name}</div><div style="font-size:11px;color:var(--text3)">금형 ${i.id} · 부품 ${i.classNo||'-'} · 현재 <span style="color:var(--red);font-weight:600">${i.qty}${i.unit}</span> / 기준 ${i.min}${i.unit}</div></div><input type="number" class="qi" id="pq-${i.id}" value="${planSel[i.id]||0}" min="0" oninput="planSel['${i.id}']=parseInt(this.value)||0;uCnt()" onfocus="this.select()"></div>`).join('')}`:''}
        ${med.length?`<div style="font-size:11px;font-weight:600;color:var(--amber);text-transform:uppercase;margin:12px 0 8px">🟡 주의 (${med.length}종)</div>${med.map(i=>`<div class="plan-row"><input type="checkbox" id="pc-${i.id}" ${planSel[i.id]>0?'checked':''} onchange="tiItem('${i.id}',this.checked)"><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600">${i.name}</div><div style="font-size:11px;color:var(--text3)">금형 ${i.id} · 부품 ${i.classNo||'-'} · 현재 <span style="color:var(--amber);font-weight:600">${i.qty}${i.unit}</span> / 기준 ${i.min}${i.unit}</div></div><input type="number" class="qi" id="pq-${i.id}" value="${planSel[i.id]||0}" min="0" oninput="planSel['${i.id}']=parseInt(this.value)||0;uCnt()" onfocus="this.select()"></div>`).join('')}`:''}

function planSearchResultHTML(){
  if(!planSq)return '';
  const q=planSq;
  const all=[...inv.filter(i=>st(i)==='low'&&!isStop(i)),...inv.filter(i=>st(i)==='med'&&!isStop(i)),...inv.filter(i=>st(i)==='ok'&&!isStop(i))];
  const f=all.filter(i=>i.name.includes(q)||i.id.includes(q)||(i.classNo||'').includes(q));
  if(!f.length)return '<div style="text-align:center;padding:14px;color:var(--text3)">검색 결과 없음</div>';
  return f.slice(0,20).map(it=>{
    const s=st(it);
    const col=s==='low'?'var(--red)':s==='med'?'var(--amber)':'var(--text2)';
    const sel=planSel[it.id]>0;
    return `<div style="display:flex;align-items:center;gap:10px;padding:8px 10px;background:${sel?'var(--blue-bg)':'var(--bg3)'};border-radius:8px;margin-bottom:5px;border:1px solid ${sel?'rgba(26,107,255,.3)':'var(--border)'}">
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:600">${it.name}</div>
        <div style="font-size:11px;color:var(--text3)">금형 <span style="font-family:monospace;color:var(--blue);font-weight:600">${it.id}</span> · 재고 <span style="color:${col};font-weight:600">${it.qty}${it.unit}</span></div>
      </div>
      <button class="btn ${sel?'':'bbl'}" style="${sel?'background:var(--blue);color:#fff;':''}padding:6px 12px;font-size:12px;flex-shrink:0" onclick="addPlanItem('${it.id}')">${sel?'✓ 선택됨':'+ 선택'}</button>
    </div>`;
  }).join('');
}
function addPlanItem(id){
  const it=inv.find(i=>i.id===id);
  if(!it)return;
  if(!planSel[id]||planSel[id]===0){
    planSel[id]=Math.max(it.min*2-it.qty,it.min,1)||1;
  }
  // 드롭다운 결과 갱신
  const box=document.getElementById('plan-search-result');
  if(box)box.innerHTML=planSearchResultHTML();
  // 선택 목록 갱신
  const lb=document.getElementById('plan-list-box');
  if(lb){
    const selected=Object.keys(planSel).filter(id=>planSel[id]>0);
    lb.innerHTML=selected.length===0
      ?'<div style="text-align:center;padding:14px;color:var(--text3);font-size:12px">위 검색창에서 품목을 선택하세요</div>'
      :selected.map(sid=>{const i=inv.find(x=>x.id===sid);if(!i)return '';return `<div class="plan-row"><input type="checkbox" id="pc-${i.id}" checked onchange="tiItem('${i.id}',this.checked)"><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600">${i.name}</div><div style="font-size:11px;color:var(--text3)">금형 ${i.id} · 현재 <span style="color:${st(i)==='low'?'var(--red)':'var(--amber)'};font-weight:600">${i.qty}${i.unit}</span></div></div><input type="number" class="qi" id="pq-${i.id}" value="${planSel[i.id]||0}" min="0" oninput="planSel['${i.id}']=parseInt(this.value)||0;uCnt()" onfocus="this.select()"></div>`;}).join('');
  }
  uCnt();
  tst('✓ '+it.name+' 선택됨');
}
function planSearch(v){
  planSq=v;
  const box=document.getElementById('plan-search-result');
  if(box)box.innerHTML=planSearchResultHTML();
}

function uCnt(){const e=document.getElementById('pcnt');if(e)e.textContent=Object.values(planSel).filter(v=>v>0).length+'종';}
function taAll(c){[...inv.filter(i=>st(i)==='low'),...inv.filter(i=>st(i)==='med')].forEach(i=>{const q=document.getElementById('pq-'+i.id);planSel[i.id]=c?(parseInt(q?.value)||0):0;const cb=document.getElementById('pc-'+i.id);if(cb)cb.checked=c;});uCnt();}
function tiItem(id,c){const q=document.getElementById('pq-'+id);planSel[id]=c?(parseInt(q?.value)||0):0;uCnt();}

function addBcItem(id){
  if(bcItems.find(b=>b.id===id)){tst('이미 추가된 품목입니다');return;}
  const it=inv.find(x=>x.id===id);
  if(!it){tst('품목을 찾을 수 없습니다');return;}
  // 라벨에 들어갈 값을 복사해서 저장 (출력 목록에서 개별 수정 가능)
  // 수량 기본값 = 제품의 포장단위(없으면 10)
  const defQty=(it.packUnit&&it.packUnit>0)?it.packUnit:10;
  bcItems.push({id,name:it.name,classNo:it.classNo||'',moldNo:it.id,qty:defQty});
  render();
  tst('✓ 출력 목록에 추가됐습니다 (포장단위 '+defQty+'EA)');
}

function printBarcodes(){
  if(!bcItems.length){tst('출력할 품목을 추가해주세요');return;}

  const allLabels=[];
  bcItems.forEach(b=>{
    // 출력 목록에서 수정된 값을 그대로 사용
    const lbl={name:b.name||'',classNo:b.classNo||'',id:b.moldNo||'',printQty:b.qty||1};
    for(let i=0;i<8;i++) allLabels.push({...lbl});
  });

  const pages=[];
  for(let i=0;i<allLabels.length;i+=8) pages.push(allLabels.slice(i,i+8));
  while(pages[pages.length-1].length<8) pages[pages.length-1].push(null);

  const makeLabel=(it)=>{
    if(!it) return `<div class="lw empty"></div>`;
    const qrVal=(it.classNo||it.id||'-');
    return `<div class="lw">
      <table class="lt">
        <colgroup>
          <col style="width:28%"><col style="width:34%">
          <col style="width:14%"><col style="width:24%">
        </colgroup>
        <tr>
          <td class="lk">업체명</td>
          <td class="lv" colspan="3"><span class="fit" style="font-weight:900">삼성 S.R</span></td>
        </tr>
        <tr>
          <td class="lk">품&nbsp;&nbsp;명</td>
          <td class="lv" colspan="3"><span class="fit" style="font-weight:800">${it.name}</span></td>
        </tr>
        <tr>
          <td class="lk">부품번호</td>
          <td class="lv" colspan="3"><span class="fit dt">${it.classNo||'-'}</span></td>
        </tr>
        <tr>
          <td class="lk">금형번호</td>
          <td class="lv qmold" align="center" style="text-align:center;vertical-align:middle"><span class="fit dt">${it.id||'-'}</span></td>
          <td class="lk">수량</td>
          <td class="lv qcell" align="center" style="text-align:center;vertical-align:middle"><span class="fit" style="font-weight:900;font-family:monospace">${it.printQty} EA</span></td>
        </tr>
        <tr>
          <td class="lk">QR코드</td>
          <td class="lv qr-cell" colspan="3">
            <div class="qrbox" data-val="${qrVal}"></div>
          </td>
        </tr>
      </table>
      <div class="made">MADE IN KOREA</div>
    </div>`;
  };

  // 행 높이 = (그리드높이 - 상4 - 하8 - gap 18mm) / 4
  const rowH='((100% - 12mm - 18mm)/4)';
  const cutLines=`
    <div class="cut cut-v"></div>
    <div class="cut cut-h" style="top:calc(4mm + ${rowH} + 3mm)"></div>
    <div class="cut cut-h" style="top:calc(4mm + 2*${rowH} + 6mm + 3mm)"></div>
    <div class="cut cut-h" style="top:calc(4mm + 3*${rowH} + 12mm + 3mm)"></div>`;

  const pagesHTML=pages.map(page=>`
    <div class="page-grid">${page.map(makeLabel).join('')}${cutLines}</div>
  `).join('');

  const html=`<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><title>삼성SR 제품 태그</title>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"><\/script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{margin:0;padding:0;background:#fff;font-family:'Malgun Gothic',sans-serif}

/* A4 한 장 = 2열 4행 = 8개 블럭. 페이지 전체를 채우고 안쪽 padding이 바깥 여백 */
.page-grid{
  position:relative;
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  grid-template-rows:repeat(4,minmax(0,1fr));
  gap:6mm;                /* 블럭 사이 간격 */
  width:210mm;
  height:297mm;
  padding:4mm 8mm 8mm 8mm; /* 상4 · 좌우8 · 하8 */
  page-break-after:always;
  align-content:stretch;
  justify-content:stretch;
}
.page-grid:last-child{page-break-after:auto}

/* 자르는 선 - 블럭 간격 중앙 */
.cut{position:absolute;background:none;pointer-events:none}

<script>
window.onload=function(){
  // QR 코드 생성 (라이브러리 로드 대기 후 실행)
  function renderQR(){
    if(typeof QRCode==='undefined'){return false;}
    document.querySelectorAll('.qrbox').forEach(function(box){
      if(box.dataset.done)return;
      var val=box.dataset.val||'-';
      try{
        new QRCode(box,{
          text:String(val),
          width:120,
          height:120,
          colorDark:'#000000',
          colorLight:'#ffffff',
          correctLevel:QRCode.CorrectLevel.M
        });
        box.dataset.done='1';
      }catch(e){console.log(e);}
    });
    return true;
  }
  var qrTries=0;
  function tryQR(){
    if(renderQR()||qrTries>20){afterQR();return;}
    qrTries++;setTimeout(tryQR,150);
  }

  // 값 글씨를 칸 크기에 맞춰 자동 확대/축소 (레이아웃 확정 후 실행)
  function fitAll(){
    document.querySelectorAll('.fit').forEach(function(span){
      var cell=span.closest('td')||span.parentElement;
      if(!cell)return;
      var cellW=cell.clientWidth;
      var cellH=cell.clientHeight;
      if(!cellW){ // 측정 실패 시 글자 수 기반 폴백
        var L=(span.textContent||'').length;
        span.style.fontSize=(L<=4?20:L<=8?16:L<=14?12:9)+'px';
        return;
      }
      var target=cellW*0.88;          /* 목표 너비 = 칸의 88% */
      var maxW=cellW-3;
      var maxFz=Math.max(cellH-2,8);  /* 칸 높이 한계 (최소 8px 보장) */
      var fz=parseFloat(window.getComputedStyle(span).fontSize)||16;
      var guard=0;
      while(span.scrollWidth<target&&span.scrollWidth<maxW&&fz<maxFz&&guard<400){
        fz+=0.5;span.style.fontSize=fz+'px';guard++;
      }
      guard=0;
      while((span.scrollWidth>maxW||fz>maxFz)&&fz>5&&guard<400){
        fz-=0.5;span.style.fontSize=fz+'px';guard++;
      }
    });
  }
  function afterQR(){
    setTimeout(fitAll,150);
    setTimeout(function(){ fitAll(); window.print(); },700);
  }
  tryQR();
};
<\/script>
</body></html>`;

function addVendor(){
  const el=document.getElementById('new-vendor');
  const v=el?.value?.trim();
  if(!v){tst('공급업체 이름을 입력해주세요');return;}
  if(SUPPLIERS.includes(v)){tst('이미 등록된 공급업체입니다');return;}
  SUPPLIERS.push(v);saveSUP();tst('✓ '+v+' 추가 완료');manageVendors();
}
function removeVendor(i){
  const v=SUPPLIERS[i];
  if(!confirm(v+' 을(를) 삭제하시겠습니까?'))return;
  SUPPLIERS.splice(i,1);saveSUP();tst(v+' 삭제 완료');manageVendors();
}

function ordSearch(v){
  orderSq=v;
  const box=document.getElementById('ord-result-box');
  if(box)box.innerHTML=ordResultHTML();

function addOrderItem(id){
  if(orderItems.find(o=>o.id===id)){tst('이미 추가된 품목입니다');return;}
  orderItems.push({id,qty:0});
  render();
  tst('✓ 발주 품목에 추가됐습니다 (수량을 입력하세요)');
}

function saveOrder(){
  if(!requireEdit())return;
  if(!orderItems.length){tst('발주할 품목을 추가해주세요');return;}
  const vendor=document.getElementById('ord-vendor')?.value?.trim()||'';
  if(!vendor){tst('공급업체를 선택해주세요');return;}
  const w=document.getElementById('ord-w')?.value||'';
  if(!w){tst('담당자를 선택해주세요');return;}
  // 수량 0 검증
  if(orderItems.some(o=>!o.qty||o.qty<1)){tst('모든 품목의 발주수량을 입력해주세요 (1 이상)');return;}
  const due=document.getElementById('ord-due')?.value||'';
  const memo=document.getElementById('ord-memo')?.value||'';
  const now=new Date();
  const docNo='PO-'+now.getFullYear().toString().slice(2)+('0'+(now.getMonth()+1)).slice(-2)+('0'+now.getDate()).slice(-2)+'-'+String(Math.floor(Math.random()*900)+100);
  const items=orderItems.map(o=>{
    const it=inv.find(i=>i.id===o.id)||{};
    return {id:o.id,name:it.name||o.id,classNo:it.classNo||'',unit:it.unit||'EA',qty:o.qty,curQty:it.qty||0,producer:it.producer||'',location:it.location||''};
  });
  // 발주서 발행 단계에서는 재고 차감하지 않음 (출력 시점에 차감됨)
  // appliedStock: 출력 시 재고 반영 여부 (false = 아직 미반영)
  orders.unshift({docNo,vendor,w,due,memo,ts:Date.now(),items,printedAt:null,appliedStock:false});
  sv();
  orderItems=[];orderSq='';
  orderForm={vendor:'',w:'',due:'',memo:''}; // 입력값 초기화
  tst('✅ 발주서 발행 완료 ('+docNo+') · 미리보기에서 출력하세요',2800);
  render();
  // 발행 직후 미리보기만 표시 (출력 버튼을 눌러야 재고 반영 + 출력완료 기록)
  setTimeout(()=>previewOrder(0),300);
}

function delOrder(i){
  if(!confirm(orders[i].docNo+' 발주서를 삭제하시겠습니까?'))return;
  orders.splice(i,1);sv();tst('발주서 삭제 완료');render();
}

function addNewProduct(){
  if(!requireEdit())return;
  const v=id=>document.getElementById(id)?.value?.trim()||'';
  const name=v('np-name');
  const moldNo=v('np-id');
  if(!name){tst('품명을 입력해주세요');return;}
  if(!moldNo){tst('금형번호를 입력해주세요');return;}
  if(inv.find(i=>i.id===moldNo)){tst('❌ 이미 존재하는 금형번호입니다');return;}
  const classNo=v('np-classno');
  const cat='기타';
  const material=v('np-material');
  const unit=v('np-unit')||'EA';
  const packUnit=parseInt(v('np-packunit'))||0;
  const rubberWeight=v('np-rubberweight');
  const steelWeight=v('np-steelweight');
  const moldLoc=v('np-moldloc');
  const cavity=parseInt(v('np-cavity'))||0;
  const qty=parseInt(v('np-qty'))||0;
  const min=parseInt(v('np-min'))||0;
  const avgOut=parseInt(v('np-avg'))||0;
  const producer=v('np-producer');
  const location=v('np-location');
  const barcode=v('np-barcode')||classNo;
  const note=v('np-note');
  // 분류별 이모지 매핑 (기존 동일 분류 제품의 이모지 사용, 없으면 기본)
  const sameCat=inv.find(i=>i.cat===cat&&i.e);
  const e=sameCat?sameCat.e:'📦';
  const newItem={id:moldNo,name,cat,unit,packUnit,qty,min,e,classNo,material,rubberWeight,steelWeight,moldLoc,cavity,location,producer,avgOut,barcode,note};
  inv.push(newItem);
  sv();
  tst('✓ '+name+' 등록 완료');
  render();
}


let pstatRange='day'; // day | week | month

function rPstat(){
  const now=new Date();
  let startTs,rangeLabel;
  if(pstatRange==='day'){
    startTs=new Date(now.getFullYear(),now.getMonth(),now.getDate()).getTime();
    rangeLabel='오늘 ('+now.toLocaleDateString('ko',{month:'long',day:'numeric'})+')';
  }else if(pstatRange==='week'){
    // 최근 7일
    startTs=now.getTime()-6*86400000;
    startTs=new Date(new Date(startTs).getFullYear(),new Date(startTs).getMonth(),new Date(startTs).getDate()).getTime();
    rangeLabel='최근 7일';
  }else{
    startTs=new Date(now.getFullYear(),now.getMonth(),1).getTime();
    rangeLabel=now.toLocaleDateString('ko',{year:'numeric',month:'long'})+' (이번 달)';
  }
  // 기간 내 입고 거래만 필터 (생산자 목록(WK)에 있는 사람의 기록만 집계, 관리자 제외)

  // 품목의 producer 기준으로 집계 (tx.w가 아닌 inv의 producer 사용)

      <div class="stat-val" style="color:var(--green)">${totalQty.toLocaleString()}</div><div class="stat-label">총 입고 수량</div>

      <div class="stat-val" style="color:var(--purple)">${totalCount}</div><div class="stat-label">입고 건수</div>

  ${!workers.length?`<div class="card"><div style="text-align:center;padding:50px;color:var(--text3)"><div style="font-size:40px;margin-bottom:14px">📭</div><div style="font-size:15px;font-weight:600;color:var(--text)">${rangeLabel} 입고 내역이 없습니다</div></div></div>`:`

// 생산자 클릭 시 해당 생산자의 입고 상세 모달
function pstatDetail(w){
  const now=new Date();
  let startTs;
  if(pstatRange==='day')startTs=new Date(now.getFullYear(),now.getMonth(),now.getDate()).getTime();
  else if(pstatRange==='week'){const s=now.getTime()-6*86400000;startTs=new Date(new Date(s).getFullYear(),new Date(s).getMonth(),new Date(s).getDate()).getTime();}
  else startTs=new Date(now.getFullYear(),now.getMonth(),1).getTime();
  // producer 기준으로 필터
  const list=txs.filter(t=>{
    if(t.type!=='in'||t.ts<startTs)return false;
    const it=inv.find(i=>i.id===t.iid);
    const prod=(it&&it.producer)||'-';
    return prod===w;
  }).sort((a,b)=>b.ts-a.ts);
  const totQty=list.reduce((s,t)=>s+t.qty,0);
  document.getElementById('mo-title').textContent='👷 '+w+' 입고 내역';
  document.getElementById('mb').innerHTML=`
    <div style="display:flex;gap:10px;margin-bottom:14px">
      <div style="flex:1;background:var(--bg3);border-radius:8px;padding:12px 14px;text-align:center"><div style="font-size:11px;color:var(--text3);margin-bottom:4px">입고 건수</div><div style="font-size:20px;font-weight:700;font-family:monospace">${list.length}건</div></div>
      <div style="flex:1;background:var(--green-bg);border-radius:8px;padding:12px 14px;text-align:center"><div style="font-size:11px;color:var(--green);margin-bottom:4px">입고 수량</div><div style="font-size:20px;font-weight:700;font-family:monospace;color:var(--green)">+${totQty.toLocaleString()}</div></div>
    </div>
    ${list.length?`<table class="tbl" style="font-size:12px">
      <thead><tr><th>품명</th><th>금형번호</th><th>수량</th><th>일시</th></tr></thead>
      <tbody>${list.map(t=>{const it=inv.find(i=>i.id===t.iid);return`<tr><td>${it?it.name:t.iid}</td><td style="font-family:monospace;color:var(--blue)">${t.iid}</td><td style="font-family:monospace;font-weight:700;color:var(--green)">+${t.qty}${it?it.unit:''}</td><td style="color:var(--text3);white-space:nowrap">${new Date(t.ts).toLocaleDateString('ko',{month:'short',day:'numeric'})} ${new Date(t.ts).toLocaleTimeString('ko',{hour:'2-digit',minute:'2-digit'})}</td></tr>`;}).join('')}</tbody>
    </table>`:'<div style="text-align:center;padding:20px;color:var(--text3)">내역 없음</div>'}`;
  document.getElementById('ov').classList.add('on');
}

// 발주서 미리보기 (재고 반영 안 함, 출력완료 기록 안 함)
function previewOrder(i){
  const o=orders[i];
  if(!o)return;
  o.items.forEach(it=>{
    if(!it.location){const cur=inv.find(x=>x.id===it.id);if(cur&&cur.location)it.location=cur.location;}
  });
  const html=buildOrderHTML(o,'preview','');
  const pw=window.open('','_blank','width=980,height=760');
  if(pw){pw.document.write(html);pw.document.close();}
  else tst('팝업 허용 후 다시 시도해주세요');
  tst('📄 발주서 미리보기 · [출력] 목록에서 출력 시 재고 반영됩니다',2800);
}

// 발주서 실제 출력 (재고 반영 + 출력완료 기록)
function printOrder(i){
  const o=orders[i];
  if(!o)return;
  // 기존 발주서에 제품위치 정보가 없으면 현재 재고에서 보완
  o.items.forEach(it=>{
    if(!it.location){const cur=inv.find(x=>x.id===it.id);if(cur&&cur.location)it.location=cur.location;}
  });
  const printNow=new Date();
  // 출력 시점 기록
  o.printedAt=printNow.getTime();
  // ★ 출력 시점에 재고 반영 (한 번만 - appliedStock이 false인 경우에만)
  let stockApplied=false;
  if(!o.appliedStock){
    o.items.forEach(it=>{
      const idx=inv.findIndex(i=>i.id===it.id);
      if(idx<0)return;
      inv[idx].qty-=it.qty;
      txs.unshift({id:Date.now()+Math.random(),type:'out',iid:it.id,qty:it.qty,w:o.w||'',ts:Date.now(),memo:`[발주출고 ${o.docNo}] ${o.vendor||''}`});
    });
    o.appliedStock=true;
    stockApplied=true;
  }
  sv();
  const printedStamp=printNow.toLocaleDateString('ko',{year:'numeric',month:'long',day:'numeric'})+' '+printNow.toLocaleTimeString('ko',{hour:'2-digit',minute:'2-digit'});
  const html=buildOrderHTML(o,'print',printedStamp);
  const pw=window.open('','_blank','width=980,height=760');
  if(pw){pw.document.write(html);pw.document.close();}
  else tst('팝업 허용 후 다시 시도해주세요');
  tst(stockApplied?'🖨️ 발주서 출력 완료 · 재고 반영됨 ('+printedStamp+')':'🖨️ 발주서 재출력 완료 ('+printedStamp+')',2800);
  render();
}

// ── 추가 첨부파일 ────────────────────────────────────────────────
function fmt(bytes){if(bytes<1024)return bytes+'B';if(bytes<1024*1024)return (bytes/1024).toFixed(1)+'KB';return (bytes/1024/1024).toFixed(1)+'MB';}
function renderAttachSection(itemId){
  const list=attaches[itemId]||[];
  const canE=canEdit();
  return `
  <div style="margin-top:18px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div style="font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em">📎 추가 첨부파일 <span style="color:var(--blue)">${list.length}개</span></div>
      ${canE?`<label style="display:inline-flex;align-items:center;gap:5px;background:var(--blue);color:#fff;font-size:12px;font-weight:700;padding:6px 14px;border-radius:7px;cursor:pointer">
        + 파일 추가
        <input type="file" multiple style="display:none" onchange="addAttach('${itemId}',this)">
      </label>`:''}
    </div>

    <div id="attach-drop-${itemId}" class="attach-drop"
      style="border:2px dashed ${list.length?'var(--border)':'var(--border2)'};border-radius:10px;padding:${list.length?'0':'24px 0'};background:var(--bg3);transition:all .15s;min-height:${list.length?'auto':'72px'};display:flex;flex-direction:column">
      ${!list.length?`
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;pointer-events:none">
          <div style="font-size:26px">📂</div>
          <div style="font-size:12px;font-weight:600;color:var(--text2)">파일을 여기에 끌어다 놓거나 위 버튼으로 추가</div>
          <div style="font-size:11px;color:var(--text3)">이미지·PDF·Word·Excel·CAD 등 모든 파일 가능</div>
        </div>`:''}
      ${list.map((f,i)=>`
        <div style="display:flex;align-items:center;gap:10px;padding:9px 12px;border-bottom:1px solid var(--border);background:var(--bg2);">
          <div style="font-size:22px;flex-shrink:0">${fileIcon(f.type,f.name)}</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${f.name}</div>
            <div style="font-size:11px;color:var(--text3)">${fmt(f.size||0)} · ${new Date(f.ts).toLocaleDateString('ko',{month:'short',day:'numeric'})} ${new Date(f.ts).toLocaleTimeString('ko',{hour:'2-digit',minute:'2-digit'})}</div>
          </div>
          <div style="display:flex;gap:5px;flex-shrink:0">
            <button onclick="openAttach('${itemId}',${i})"

function addAttach(itemId, inputEl){
  if(!requireEdit())return;
  const files=inputEl.files;
  if(!files||!files.length)return;
  const MAX=10*1024*1024; // 10MB 경고
  let cnt=0;
  const load=(i)=>{
    if(i>=files.length){
      if(cnt)tst('✓ 첨부파일 '+cnt+'개 추가됨');
      svImgs();
      // 모달 내 섹션만 새로고침
      const wrap=document.getElementById('ov').querySelector('[id^="attach-drop-"]');
      if(wrap){
        const sec=wrap.closest('div[style*="margin-top:18px"]');
        if(sec)sec.outerHTML=renderAttachSection(itemId);
        setupAttachDrop(itemId);
      }
      return;
    }
    const file=files[i];
    if(file.size>MAX)tst('⚠️ '+file.name+' — 10MB 초과, 큰 파일은 저장공간을 많이 사용합니다',2500);
    const reader=new FileReader();
    reader.onload=function(e){
      if(!attaches[itemId])attaches[itemId]=[];
      attaches[itemId].push({name:file.name,type:file.type,size:file.size,data:e.target.result,ts:Date.now()});
      cnt++;
      load(i+1);
    };
    reader.onerror=function(){tst('읽기 실패: '+file.name);load(i+1);};
    reader.readAsDataURL(file);
  };
  load(0);
}

function openAttach(itemId, idx){

    if(!win){tst('팝업 허용 후 다시 시도해주세요');return;}

    }else if(f.type==='application/pdf'){

    }else{
      win.document.write('<html><head><title>'+f.name+'</title></head><body style="font-family:sans-serif;padding:40px;text-align:center"><p style="font-size:18px;margin-bottom:24px">'+f.name+'</p><a href="'+f.data+'" download="'+f.name+'" style="display:inline-block;padding:14px 32px;background:#1a6bff;color:#fff;border-radius:10px;text-decoration:none;font-weight:700;font-size:16px">📥 파일 다운로드</a></body></html>');

function setupAttachDrop(itemId){
  const box=document.getElementById('attach-drop-'+itemId);
  if(!box||!canEdit())return;
  box.addEventListener('dragover',e=>{e.preventDefault();box.style.borderColor='var(--blue)';box.style.background='var(--blue-bg)';});
  box.addEventListener('dragleave',e=>{e.preventDefault();box.style.borderColor='';box.style.background='var(--bg3)';});
  box.addEventListener('drop',e=>{
    e.preventDefault();
    box.style.borderColor='';box.style.background='var(--bg3)';
    const files=e.dataTransfer.files;
    if(!files||!files.length)return;
    addAttach(itemId,{files});
  });

function saveItemEdit(id){
  if(!requireEdit())return;
  const idx=inv.findIndex(i=>i.id===id);if(idx<0)return;
  const qty=parseInt(document.getElementById('edit-qty')?.value);
  const min=parseInt(document.getElementById('edit-min')?.value);
  const avg=parseInt(document.getElementById('edit-avg')?.value)||0;
  const producer=document.getElementById('edit-producer2')?.value||'';
  const loc=document.getElementById('edit-loc2')?.value?.trim()||'';
  const moldNo=document.getElementById('edit-moldno')?.value?.trim()||'';
  const moldLoc=document.getElementById('edit-moldloc')?.value?.trim()||'';
  const partNo=document.getElementById('edit-partno')?.value?.trim()||'';
  const mat=document.getElementById('edit-material')?.value?.trim()||'';
  const packUnit=parseInt(document.getElementById('edit-packunit')?.value)||0;
  const rubberWeight=document.getElementById('edit-rubberweight')?.value?.trim()||'';
  const steelWeight=document.getElementById('edit-steelweight')?.value?.trim()||'';
  const cavity=parseInt(document.getElementById('edit-cavity')?.value)||0;
  const prodStatus=document.getElementById('edit-prodstatus')?.value||'';
  const prodStop=document.getElementById('edit-prodstop')?.value||'';
  if(isNaN(qty)){tst('재고 수량을 확인해주세요');return;}
  if(isNaN(min)||min<0){tst('최소기준을 확인해주세요');return;}
  const prevQty=inv[idx].qty;
  const finalProducer=producer||inv[idx].producer||'';
  inv[idx].qty=qty;
  inv[idx].min=min;
  inv[idx].avgOut=avg;
  if(producer)inv[idx].producer=producer;
  if(loc)inv[idx].location=loc;
  inv[idx].moldLoc=moldLoc;
  if(moldNo&&moldNo!==id){
    // 금형번호(ID) 변경 시 사진/도면 저장 키도 함께 이전
    if(imgs[id]){imgs[moldNo]=imgs[id];delete imgs[id];}
    if(draws[id]){draws[moldNo]=draws[id];delete draws[id];}
    svImgs();
    inv[idx].id=moldNo;
  }
  if(partNo)inv[idx].classNo=partNo;
  if(mat)inv[idx].material=mat;
  inv[idx].packUnit=packUnit;
  inv[idx].rubberWeight=rubberWeight;
  inv[idx].steelWeight=steelWeight;
  inv[idx].cavity=cavity||0;
  if(prodStatus)inv[idx].prodStatus=prodStatus;
  inv[idx].prodStop=prodStatus==='stop'?prodStop:'';
  // 재고 수량이 달라진 경우 → 생산자별 현황에 즉시 반영되도록 트랜잭션 자동 생성
  const qDiff=qty-prevQty;
  if(qDiff!==0){
    const txId=inv[idx].id;
    const txWorker=finalProducer||(curUser?curUser.name:'(수동조정)');
    txs.unshift({id:Date.now(),type:qDiff>0?'in':'out',iid:txId,qty:Math.abs(qDiff),w:txWorker,ts:Date.now(),memo:'[상세수정] 재고조정 '+prevQty+'→'+qty});
  }
  sv();cmo();tst('✓ '+inv[idx].name+' 정보 저장 완료');render();
}

function rdXLFile(file){
  if(!file)return;
  const r=new FileReader();
  r.onload=function(e){
    try{
      const txt=e.target.result.replace(/^\uFEFF/,'');
      let rows=txt.trim().split(/\r?\n/).map(r=>r.split(',').map(c=>c.trim().replace(/^"|"$/g,'')));
      // 헤더 행 제거 (첫 칸이 '금형번호'이거나 숫자가 아니면 헤더로 간주)
      if(rows[0]&&(rows[0][0]==='금형번호'||rows[0][0]==='popup 코드'||rows[0][1]==='품목명'||rows[0][1]==='품명'))rows.shift();
      const items=rows.filter(r=>r[0]&&r[1]).map(r=>({
        id:(r[0]||'').trim(),
        name:(r[1]||'').trim(),
        cat:(r[2]||'기타').trim(),
        unit:(r[3]||'EA').trim(),
        packUnit:parseInt(r[4])||0,
        qty:parseInt(r[5])||0,
        min:parseInt(r[6])||0,
        avgOut:parseInt(r[7])||0,
        classNo:(r[8]||'').trim(),
        material:(r[9]||'').trim(),
        rubberWeight:(r[10]||'').trim(),
        steelWeight:(r[11]||'').trim(),
        location:(r[12]||'').trim(),
        moldLoc:(r[13]||'').trim(),
        producer:(r[14]||'').trim(),
        note:(r[15]||'').trim(),
        barcode:(r[8]||r[0]||'').trim(),
        e:'📦'
      }));
      if(!items.length){tst('품목을 찾을 수 없습니다');return;}
      pendXL=items;
      const p=document.getElementById('xl-prev');if(!p)return;p.style.display='block';
      p.innerHTML=`<div style="background:var(--bg3);border-radius:8px;padding:14px">
        <div style="font-size:13px;font-weight:700;margin-bottom:8px">${file.name} — ${items.length}개 품목</div>
        ${items.slice(0,3).map(it=>`<div style="font-size:12px;color:var(--text2);padding:2px 0">• ${it.name} (${it.qty}${it.unit}) · ${it.material||'-'} · ${it.location||'-'}</div>`).join('')}

}

function dlCSV(){

  const headers=['금형번호','품명','분류','단위','포장단위','현재재고','최소기준','월평균출하','부품번호','재질','고무무게','스틸무게','제품위치','금형위치','생산자','바코드','상태','비고'];

    const esc=v=>{
      v=(v===null||v===undefined)?'':String(v);

function restoreBackup(file){

  const r=new FileReader();
