<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="삼성SR">
<meta name="theme-color" content="#080d1a">
<title>SR 위치검색</title>

<script>
// PWA 아이콘 SVG → canvas → PNG → manifest 동적 생성
(function() {
  const svgStr = `<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
    <rect width="512" height="512" rx="80" fill="#080d1a"/>
    <circle cx="256" cy="256" r="220" fill="rgba(255,215,0,0.06)" stroke="#FFE234" stroke-width="18"/>
    <circle cx="256" cy="256" r="220" fill="url(#g)"/>
    <defs>
      <radialGradient id="g" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#FFE55C" stop-opacity="0.45"/>
        <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
      </radialGradient>
    </defs>
    <polygon points="256,82 277,144 342,146 292,183 311,246 256,210 201,246 220,183 170,146 235,144" fill="#FFE234"/>
    <polygon points="138,206 159,268 224,270 174,307 193,370 138,334 83,370 102,307 52,270 117,268" fill="#FFE234"/>
    <polygon points="374,206 395,268 460,270 410,307 429,370 374,334 319,370 338,307 288,270 353,268" fill="#FFE234"/>
  </svg>`;
  const b64 = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgStr)));

  // apple-touch-icon
  const link = document.createElement('link');
  link.rel = 'apple-touch-icon';
  link.href = b64;
  document.head && document.head.appendChild(link);

  // manifest
  const manifest = {
    name: 'SAMSUNG S.R 위치검색',
    short_name: '삼성SR',
    start_url: '.',
    display: 'standalone',
    background_color: '#080d1a',
    theme_color: '#080d1a',
    icons: [
      {src: b64, sizes: '512x512', type: 'image/svg+xml'},
      {src: b64, sizes: '192x192', type: 'image/svg+xml'}
    ]
  };
  const mBlob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
  const mUrl = URL.createObjectURL(mBlob);
  const mLink = document.createElement('link');
  mLink.rel = 'manifest';
  mLink.href = mUrl;
  document.head && document.head.appendChild(mLink);
})();
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;600;700&display=swap');
/* 스플래시 */
#splash{position:fixed;inset:0;background:#080d1a;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity .6s ease}
#splash.hide{opacity:0;pointer-events:none}
#splash .sp-logo{filter:drop-shadow(0 0 30px rgba(255,215,0,.6))}
#splash .sp-title{font-family:'Orbitron',sans-serif;font-size:26px;font-weight:900;color:#fff;letter-spacing:.08em;text-shadow:0 0 20px rgba(0,212,255,.8)}
#splash .sp-sub{font-size:12px;color:rgba(255,255,255,.35);letter-spacing:.15em}
:root {
  --navy:#080d1a; --navy2:#0f1628; --navy3:#1a2340;
  --blue:#2563ff; --cyan:#00d4ff; --amber:#ffb800; --text:#eef2ff; --text2:#7788aa;
  --border:rgba(255,255,255,0.07);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--navy);color:var(--text);font-family:'Noto Sans KR',sans-serif;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(37,99,255,0.035) 1px,transparent 1px),linear-gradient(90deg,rgba(37,99,255,0.035) 1px,transparent 1px);background-size:28px 28px;pointer-events:none;z-index:0}
.app{position:fixed;inset:0;display:flex;flex-direction:column;z-index:1}

/* 헤더 */
.header{padding:14px 16px 12px;flex-shrink:0}
.header-top{display:flex;flex-direction:column;align-items:stretch;gap:6px;margin-bottom:14px}
/* 타이틀 - 위아래 두 블록 */
.title-block1{background:linear-gradient(135deg,rgba(10,20,60,0.95),rgba(20,40,100,0.9));border:1px solid rgba(37,99,255,0.5);border-radius:12px;padding:12px 16px;font-family:'Orbitron',sans-serif;font-size:28px;font-weight:900;letter-spacing:.06em;color:#fff;text-shadow:0 0 20px rgba(0,212,255,0.9),0 0 40px rgba(37,99,255,0.5);box-shadow:0 0 24px rgba(37,99,255,0.35),inset 0 1px 0 rgba(255,255,255,0.1)}
.title-block2{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:9px 16px;font-family:'Black Han Sans',sans-serif;font-size:20px;letter-spacing:.05em;color:rgba(255,255,255,0.85);display:flex;align-items:center;justify-content:space-between}
.title-block2 .t2-count{font-size:12px;font-weight:700;background:rgba(0,212,255,0.12);border:1px solid rgba(0,212,255,0.25);border-radius:20px;padding:4px 12px;color:var(--cyan);font-family:'Noto Sans KR',sans-serif;letter-spacing:0;white-space:nowrap}

/* 검색창 */
.search-wrap{position:relative}
.search-input{width:100%;background:var(--navy2);border:1.5px solid var(--border);border-radius:14px;padding:15px 44px 15px 48px;color:var(--text);font-size:17px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .2s,box-shadow .2s;-webkit-appearance:none}
.search-input:focus{border-color:rgba(37,99,255,.6);box-shadow:0 0 0 3px rgba(37,99,255,.12)}
.search-input::placeholder{color:var(--text2)}
.si{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--text2);pointer-events:none}
.clear-btn{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.1);border:none;border-radius:50%;width:26px;height:26px;color:var(--text2);cursor:pointer;display:none;align-items:center;justify-content:center;font-size:14px}
.clear-btn.show{display:flex}

/* 결과 */
.results{flex:1;overflow-y:auto;padding:8px 14px 80px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.results::-webkit-scrollbar{display:none}

/* 빈 화면 */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:65%;color:var(--text2);text-align:center;padding:20px}
.empty-main{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1}
.contact{position:fixed;bottom:0;left:0;right:0;padding:10px 16px 16px;background:linear-gradient(0deg,rgba(8,13,26,0.98) 60%,transparent);z-index:50;display:flex;align-items:center;justify-content:center}
.contact-label{display:none}
.contact-link{display:inline-flex;align-items:center;gap:10px;background:rgba(0,212,255,0.07);border:1px solid rgba(0,212,255,0.25);border-radius:24px;padding:10px 22px;color:var(--cyan);font-weight:700;text-decoration:none;font-size:14px;letter-spacing:.04em;transition:all .2s;box-shadow:0 0 12px rgba(0,212,255,0.1)}
.contact-link:active{background:rgba(37,99,255,0.25)}
.empty-icon{font-size:60px;margin-bottom:18px;filter:drop-shadow(0 0 18px rgba(0,212,255,.3))}
.empty-title{font-size:17px;font-weight:700;color:var(--text);margin-bottom:8px}
.empty-sub{font-size:20px;line-height:1.7;color:var(--text2)}

/* 결과 수 */
.result-meta{font-size:12px;color:var(--text2);padding:6px 2px 10px;display:flex;align-items:center;justify-content:space-between}
.result-meta strong{color:var(--cyan);font-weight:700}
.result-pdf-btn{font-size:11px;font-weight:700;color:#fff;background:linear-gradient(135deg,rgba(255,100,50,.9),rgba(255,184,0,.8));border:1px solid rgba(255,184,0,.5);border-radius:14px;padding:4px 11px;cursor:pointer;white-space:nowrap;box-shadow:0 0 8px rgba(255,140,0,.25)}
.result-pdf-btn:active{opacity:.7}

/* 카드 */
.card{background:var(--navy2);border:1px solid var(--border);border-radius:16px;margin-bottom:10px;overflow:hidden;cursor:pointer;transition:transform .12s,background .12s;animation:fadeUp .18s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.card:active{transform:scale(.975);background:var(--navy3)}

/* 위치 띠 */
.card-location{display:flex;align-items:center;gap:10px;background:linear-gradient(90deg,rgba(37,99,255,.18),rgba(0,212,255,.10));border-bottom:1px solid rgba(0,212,255,.12);padding:13px 16px}
.loc-icon{font-size:20px;flex-shrink:0}
.loc-main{display:flex;align-items:center;gap:8px;flex:1;min-width:0;flex-wrap:wrap}
.loc-text{font-size:20px;font-weight:700;font-family:'Noto Sans KR',sans-serif;color:var(--cyan);letter-spacing:.02em;text-shadow:0 0 12px rgba(0,212,255,.4);white-space:nowrap}
.loc-mold{font-size:20px;font-weight:400;font-family:'Noto Sans KR',sans-serif;color:rgba(255,255,255,.8);white-space:nowrap}
.loc-producer{font-size:20px;font-weight:400;font-family:'Noto Sans KR',sans-serif;color:#ffb800;white-space:nowrap;display:inline-flex;align-items:baseline;gap:3px}
.loc-producer .prod-label{font-size:12px;color:rgba(255,184,0,.7);font-weight:600}
.loc-empty{font-size:14px;color:var(--text2)}

/* 카드 정보 */
.card-info{padding:11px 16px 13px}
.card-name{font-size:14px;font-weight:700;margin-bottom:7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.chip-row{display:flex;flex-wrap:wrap;gap:5px}
.chip{display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:6px;padding:3px 9px;font-size:11px}
.chip .lbl{color:var(--text2);margin-right:2px}
.chip .val{color:var(--text);font-weight:600;font-family:monospace;font-size:17px}
.chip.c-blue .val{color:#6ab0ff}
.chip.c-amber .val{color:var(--amber)}

/* 모달 */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);z-index:200;display:none;align-items:center;justify-content:center;padding:16px}
.ov.on{display:flex;animation:fadeBg .15s ease}
@keyframes fadeBg{from{opacity:0}to{opacity:1}}
.mo{background:var(--navy2);border-radius:20px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;-webkit-overflow-scrolling:touch;border:1px solid rgba(0,212,255,.18);animation:slideUp .2s ease;box-shadow:0 20px 60px rgba(0,0,0,.6)}
@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.mo-handle{width:40px;height:4px;background:rgba(255,255,255,.12);border-radius:2px;margin:12px auto 0}
.mo-body{padding:18px 18px 40px}

/* 모달 큰 위치 */
.big-loc{background:linear-gradient(135deg,rgba(37,99,255,.15),rgba(0,212,255,.1));border:1.5px solid rgba(0,212,255,.22);border-radius:16px;padding:22px;text-align:center;margin-bottom:16px}
.big-loc-label{font-size:11px;color:var(--text2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
.big-loc-val{font-size:40px;font-weight:700;font-family:'Black Han Sans',sans-serif;color:var(--cyan);text-shadow:0 0 30px rgba(0,212,255,.65);letter-spacing:.05em}
.big-loc-empty{font-size:16px;color:var(--text2)}

.mo-name{font-size:18px;font-weight:700;margin-bottom:14px;line-height:1.35}
.mo-rows{display:flex;flex-direction:column;gap:8px}
.mo-row{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px}
.mo-row .k{font-size:12px;color:var(--text2)}
.mo-row .v{font-size:14px;font-weight:700;font-family:monospace;color:var(--text)}
.mo-row .v.blue{color:#6ab0ff}

/* 관리자 버튼 */
.admin-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 13px;border-radius:20px;border:none;font-size:12px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .18s;white-space:nowrap;letter-spacing:.02em}
.admin-btn.login{background:linear-gradient(135deg,rgba(37,99,255,.25),rgba(0,212,255,.15));border:1.5px solid rgba(0,212,255,.45);color:var(--cyan);box-shadow:0 0 12px rgba(0,212,255,.2)}
.admin-btn.login:active{background:rgba(0,212,255,.3)}
.admin-btn.logout{background:linear-gradient(135deg,rgba(255,68,100,.22),rgba(255,120,50,.12));border:1.5px solid rgba(255,80,100,.5);color:#ff7088;box-shadow:0 0 12px rgba(255,68,100,.2);animation:adminPulse 2.2s ease-in-out infinite}
@keyframes adminPulse{0%,100%{box-shadow:0 0 10px rgba(255,68,100,.2)}50%{box-shadow:0 0 20px rgba(255,68,100,.45)}}
.admin-btn.logout:active{background:rgba(255,68,100,.3)}
.admin-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.admin-btn.login .admin-dot{background:var(--cyan);box-shadow:0 0 6px var(--cyan)}
.admin-btn.logout .admin-dot{background:#ff7088;box-shadow:0 0 6px #ff4466;animation:dotBlink 1.1s ease-in-out infinite}
@keyframes dotBlink{0%,100%{opacity:1}50%{opacity:.3}}

/* 비번 오버레이 */
.pw-ov{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);z-index:300;display:none;align-items:center;justify-content:center}
.pw-ov.on{display:flex;animation:fadeBg .15s ease}
.pw-box{background:var(--navy2);border:1px solid var(--border);border-radius:20px;padding:28px 24px;width:calc(100% - 48px);max-width:320px;text-align:center}
.pw-title{font-size:17px;font-weight:700;margin-bottom:6px}
.pw-sub{font-size:13px;color:var(--text2);margin-bottom:20px}
.pw-input{width:100%;background:var(--navy3);border:1.5px solid var(--border);border-radius:12px;padding:14px;color:var(--text);font-size:22px;text-align:center;letter-spacing:.3em;outline:none;font-family:monospace;-webkit-appearance:none}
.pw-input:focus{border-color:rgba(37,99,255,.6)}
.pw-err{font-size:13px;color:var(--red);margin-top:8px;min-height:18px}
.pw-btns{display:flex;gap:8px;margin-top:16px}
.pw-btn{flex:1;padding:12px;border-radius:10px;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif}
.pw-btn.cancel{background:rgba(255,255,255,0.06);color:var(--text2)}
.pw-btn.confirm{background:var(--blue);color:#fff}

/* 위치 수정 모달 내 */
.edit-loc-wrap{margin-top:14px;display:none}
.edit-loc-wrap.show{display:block}
.mo-edit-section{background:rgba(37,99,255,.06);border:1px solid rgba(37,99,255,.2);border-radius:12px;padding:14px;animation:fadeUp .15s ease}
.mo-edit-row{margin-bottom:10px}
.edit-loc-input{width:100%;background:var(--navy3);border:1.5px solid rgba(37,99,255,.4);border-radius:10px;padding:12px 14px;color:var(--text);font-size:16px;font-weight:700;outline:none;font-family:monospace;-webkit-appearance:none;margin-bottom:8px;inputmode:numeric}
.edit-loc-input:focus{border-color:var(--cyan)}
.save-loc-btn{width:100%;padding:12px;border-radius:10px;border:none;background:var(--blue);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif}
.save-loc-btn:active{opacity:.8}

/* 생산자 수정 영역 */
.edit-producer-wrap{margin-top:10px;display:none}
.edit-producer-wrap.show{display:block}
.edit-producer-label{font-size:11px;color:var(--text2);letter-spacing:.06em;margin-bottom:6px;font-weight:600}
.producer-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.producer-chip{padding:6px 13px;border-radius:20px;border:1.5px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);color:var(--text2);font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;font-family:'Noto Sans KR',sans-serif;white-space:nowrap}
.producer-chip:active,.producer-chip.active{background:rgba(0,212,255,.18);border-color:rgba(0,212,255,.55);color:var(--cyan)}
.edit-producer-input{width:100%;background:var(--navy3);border:1.5px solid rgba(255,184,0,.35);border-radius:10px;padding:10px 14px;color:var(--text);font-size:15px;font-weight:700;outline:none;font-family:'Noto Sans KR',sans-serif;-webkit-appearance:none;margin-bottom:8px;placeholder-color:var(--text2)}
.edit-producer-input:focus{border-color:var(--amber)}
.save-producer-btn{width:100%;padding:11px;border-radius:10px;border:none;background:linear-gradient(135deg,rgba(255,184,0,.85),rgba(255,140,0,.8));color:#080d1a;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;letter-spacing:.02em}
.save-producer-btn:active{opacity:.8}

/* 보안관별 배지 */
  10%  { opacity: 1; }
  90%  { opacity: 1; }
  100% { transform: translateY(60px); opacity: 0; }
}
  50%     { filter: drop-shadow(0 0 6px rgba(0,212,255,0.9)); }
}






.star-badge{display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* 변경 이력 버튼 */
.chg-fab{position:fixed;bottom:70px;right:16px;width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,rgba(37,99,255,.85),rgba(0,212,255,.7));border:1.5px solid rgba(0,212,255,.5);color:#fff;font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:100;box-shadow:0 0 18px rgba(0,212,255,.35);transition:transform .15s}
.chg-fab:active{transform:scale(.9)}
.chg-badge{position:absolute;top:-4px;right:-4px;background:#ff4466;color:#fff;font-size:10px;font-weight:700;border-radius:10px;min-width:18px;height:18px;padding:0 4px;display:none;align-items:center;justify-content:center;border:2px solid var(--navy)}
.chg-badge.show{display:flex}

/* 앱 저장 버튼 */
.save-fab{position:fixed;bottom:70px;left:16px;width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,rgba(0,200,100,.85),rgba(0,212,255,.6));border:1.5px solid rgba(0,220,120,.5);color:#fff;font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:100;box-shadow:0 0 18px rgba(0,200,100,.3);transition:transform .15s,opacity .2s,filter .2s}
.save-fab:active{transform:scale(.9)}
.save-fab.disabled{background:rgba(80,80,80,.3);border-color:rgba(255,255,255,.1);box-shadow:none;filter:grayscale(1);opacity:.35;cursor:not-allowed}

/* 변경 이력 패널 */
.chg-ov{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);z-index:250;display:none;align-items:flex-end}
.chg-ov.on{display:flex;animation:fadeBg .15s ease}
.chg-panel{background:var(--navy2);border-radius:24px 24px 0 0;width:100%;max-height:85vh;display:flex;flex-direction:column;border-top:1px solid rgba(0,212,255,.2);animation:slideUp .2s ease}
.chg-handle{width:40px;height:4px;background:rgba(255,255,255,.12);border-radius:2px;margin:12px auto 6px;flex-shrink:0}

/* 헤더 - 일반 모드 */
.chg-header{display:flex;align-items:center;justify-content:space-between;padding:10px 18px 12px;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,.06)}
.chg-title{font-size:16px;font-weight:700;color:var(--text)}
.chg-header-btns{display:flex;gap:8px;align-items:center}
.chg-sel-btn{font-size:12px;color:var(--cyan);font-weight:700;padding:5px 12px;border:1px solid rgba(0,212,255,.3);border-radius:20px;cursor:pointer;background:rgba(0,212,255,.07)}
.chg-delall-btn{font-size:12px;color:#ff6688;font-weight:700;padding:5px 12px;border:1px solid rgba(255,80,100,.25);border-radius:20px;cursor:pointer;background:rgba(255,80,100,.08)}

/* 헤더 - 선택 모드 */
.chg-sel-header{display:none;align-items:center;justify-content:space-between;padding:10px 18px 12px;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,.06);background:rgba(37,99,255,.08)}
.chg-sel-header.on{display:flex}
.chg-header.hidden{display:none}
.chg-sel-info{font-size:14px;font-weight:700;color:var(--cyan)}
.chg-sel-actions{display:flex;gap:8px}
.chg-sel-cancel{font-size:12px;color:var(--text2);font-weight:700;padding:5px 12px;border:1px solid rgba(255,255,255,.12);border-radius:20px;cursor:pointer;background:rgba(255,255,255,.05)}
.chg-sel-delete{font-size:12px;color:#fff;font-weight:700;padding:5px 14px;border:none;border-radius:20px;cursor:pointer;background:#ff4466}
.chg-sel-delete:disabled{background:rgba(255,68,102,.3);color:rgba(255,255,255,.4)}

/* 전체 선택 바 */

.chg-item-cb{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:20px;height:20px;accent-color:var(--cyan);cursor:pointer;display:none}
.chg-item-cb.on{display:block}
.chg-item-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.chg-item-id{font-size:13px;font-weight:700;color:var(--cyan);font-family:monospace}
.chg-item-date{font-size:11px;color:var(--text2)}
.chg-item-arrow{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.chg-from{font-size:15px;font-weight:700;color:rgba(255,255,255,.5);font-family:'Black Han Sans',sans-serif;text-decoration:line-through;text-decoration-color:rgba(255,100,100,.5)}
.chg-arr{font-size:16px;color:var(--amber)}
.chg-to{font-size:15px;font-weight:700;color:var(--cyan);font-family:'Black Han Sans',sans-serif;text-shadow:0 0 10px rgba(0,212,255,.4)}
.chg-item-name{font-size:11px;color:var(--text2);margin-top:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

document.getElementById('total-cnt').textContent = DATA.length;

let timer = null;

function onSearch(val) {
  document.getElementById('clear-btn').classList.toggle('show', val.length > 0);
  clearTimeout(timer);
  timer = setTimeout(() => renderResults(val.trim()), 80);
}

function clearSearch() {
  const inp = document.getElementById('search');
  inp.value = '';
  inp.focus();
  document.getElementById('clear-btn').classList.remove('show');
  renderResults('');
}

function renderResults(q) {
  const box = document.getElementById('results');
  if (!q) {
    box.innerHTML = `<div class="empty">
      <div class="empty-icon">📍</div>
      <div class="empty-sub">금형번호 (예: 75, 591)<br>또는 부품번호를 입력하세요</div>
    </div>`;
    return;
  }
  const qu = q.toUpperCase();
  const list = DATA.filter(d =>
    d.id.toUpperCase().includes(qu) ||
    d.name.toUpperCase().includes(qu) ||
    (d.classNo || '').includes(q)
  ).sort((a, b) => {
    const aId = a.id.toUpperCase().includes(qu);
    const bId = b.id.toUpperCase().includes(qu);
    if (aId && !bId) return -1;
    if (!aId && bId) return 1;
    return 0;
  });
  if (!list.length) {
    box.innerHTML = `<div class="empty">
      <div class="empty-icon">🔍</div>
      <div class="empty-title">검색 결과 없음</div>
      <div class="empty-sub">"${q}"에 해당하는<br>품목을 찾을 수 없습니다</div>
    </div>`;
    return;
  }
  // 전역 변수에 현재 검색 결과 저장 (PDF용)
  window._lastSearchList = list;
  window._lastSearchQ = q;

  box.innerHTML =
    `<div class="result-meta">검색 결과 <strong>${list.length}건</strong></div>` +
    list.map((d, i) => `
    <div class="card" onclick="openModal('${d.id}')" style="animation-delay:${i * 25}ms">
      <div class="card-location">
        <div class="loc-icon">📍</div>
        <div class="loc-main">
          ${d.location
            ? `<div class="loc-text">${d.location}</div>`
            : `<div class="loc-empty">위치 미등록</div>`}

/* 모달 내 편집 섹션 토글 */
function moToggleSection(type) {
  const sec = document.getElementById('mo-'+type+'-section');
  const isOpen = sec.style.display !== 'none';
  // 모두 닫기
  ['loc','prod'].forEach(t => {
    const s = document.getElementById('mo-'+t+'-section');
    if (s) s.style.display = 'none';
  });
  if (!isOpen) {
    sec.style.display = 'block';
    // 입력창 포커스
    const inp = sec.querySelector('input');
    if (inp) setTimeout(() => inp.focus(), 80);
  }
}

function saveLocation(id) {
  const newLoc = document.getElementById('edit-loc-input').value.trim();
  if (!newLoc) { showToast('위치를 입력해주세요'); return; }
  const idx = DATA.findIndex(d => d.id === id);
  if (idx < 0) return;
  const oldLoc = DATA[idx].location || '미등록';
  if (oldLoc === newLoc) { showToast('동일한 위치입니다'); return; }
  DATA[idx].location = newLoc;
  localStorage.setItem('sr-loc-overrides', JSON.stringify(
    DATA.reduce((acc, d) => { acc[d.id] = d.location; return acc; }, {})
  ));
  addChgLog(id, DATA[idx].name, oldLoc, newLoc);
  showToast('📍 위치 저장: ' + oldLoc + ' → ' + newLoc);
  // 모달 내 위치 값 즉시 갱신
  const valEl = document.getElementById('mo-loc-val');
  if (valEl) { valEl.textContent = newLoc; valEl.className = 'big-loc-val'; }
  moToggleSection('loc'); // 편집창 닫기
  // 검색 결과 갱신
  const q = document.getElementById('search').value;
  if (q) renderResults(q.trim());
}

const PRODUCER_LIST = ["김홍현", "송형목", "안호원", "오정옥", "우대웅", "이창호", "황인전"];

// localStorage 생산자 오버라이드 로드 (기존 값은 note로 병합 후 초기화)
(function loadProducerOverrides() {
  try {
    const ov = JSON.parse(localStorage.getItem('sr-producer-overrides') || '{}');
    DATA.forEach(d => {
      const saved = ov[d.id];
      if (saved !== undefined) {
        // localStorage에 명시적으로 저장된 값이 있으면 그걸 우선 적용 (빈값 포함)
        d.producer = saved;
      }
      // localStorage에 없으면 DATA에 원래 있던 producer 값 그대로 유지
    });
  } catch(e) {}
})();

function selectProducerChip(el, name) {
  document.querySelectorAll('#producer-chips .producer-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('edit-producer-input').value = name;
}

function deleteProducer(id) {
  const idx = DATA.findIndex(d => d.id === id);
  if (idx < 0) return;
  const oldProd = DATA[idx].producer;
  if (!oldProd) { showToast('등록된 생산자가 없습니다'); return; }
  DATA[idx].producer = '';
  const ov = (() => { try { return JSON.parse(localStorage.getItem('sr-producer-overrides') || '{}'); } catch(e) { return {}; } })();
  ov[id] = '';
  localStorage.setItem('sr-producer-overrides', JSON.stringify(ov));
  addChgLog(id, DATA[idx].name, '생산자:' + oldProd, '생산자:미등록');
  showToast('🗑️ 생산자 삭제: ' + oldProd);
  // 모달 내 즉시 갱신
  const valEl = document.getElementById('mo-prod-val');
  if (valEl) { valEl.textContent = '미등록'; valEl.style.color = 'var(--text2)'; }
  const delBtn = document.getElementById('mo-prod-del-btn');
  if (delBtn) delBtn.style.display = 'none';
  // 입력창도 초기화
  const inp = document.getElementById('edit-producer-input');
  if (inp) inp.value = '';
  document.querySelectorAll('#producer-chips .producer-chip').forEach(c => c.classList.remove('active'));
  const q = document.getElementById('search').value;
  if (q) renderResults(q.trim());
}

function saveProducer(id) {
  const newProd = document.getElementById('edit-producer-input').value.trim();
  const idx = DATA.findIndex(d => d.id === id);
  if (idx < 0) return;
  const oldProd = DATA[idx].producer || '';
  if (oldProd === newProd) { showToast('동일한 생산자입니다'); return; }
  DATA[idx].producer = newProd;
  const ov = (() => { try { return JSON.parse(localStorage.getItem('sr-producer-overrides') || '{}'); } catch(e) { return {}; } })();
  ov[id] = newProd;
  localStorage.setItem('sr-producer-overrides', JSON.stringify(ov));
  addChgLog(id, DATA[idx].name, '생산자:' + (oldProd||'미등록'), '생산자:' + (newProd||'미등록'));
  showToast('🏭 생산자 저장: ' + (newProd || '(없음)'));
  // 모달 내 생산자 표시 즉시 갱신
  const valEl = document.getElementById('mo-prod-val');
  if (valEl) { valEl.textContent = newProd || '미등록'; valEl.style.color = newProd ? '#ffb800' : 'var(--text2)'; }
  const delBtn = document.getElementById('mo-prod-del-btn');
  if (delBtn) {
    if (newProd) {
      delBtn.outerHTML = `<button onclick="event.stopPropagation();deleteProducer('${id}')" style="background:rgba(255,68,100,.15);border:1px solid rgba(255,68,100,.4);color:#ff7088;border-radius:8px;padding:5px 11px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif" id="mo-prod-del-btn">삭제</button>`;
    } else {
      delBtn.style.display = 'none';
    }
  }
  moToggleSection('prod');
  const q = document.getElementById('search').value;
  if (q) renderResults(q.trim());
}

function closeProdPanel() {

function addProducerToList() {
  const inp = document.getElementById('new-producer-input');
  const name = inp.value.trim();
  if (!name) { showToast('이름을 입력해주세요'); return; }

  PRODUCER_LIST.push(name);
  inp.value = '';
  renderProdList();
  showToast('✅ 생산자 추가: ' + name);

function removeProducerFromList(idx) {
  const name = PRODUCER_LIST[idx];
  PRODUCER_LIST.splice(idx, 1);
  renderProdList();
  showToast('🗑️ 삭제: ' + name);
}

function fmtDate(ts) {
  const d = new Date(ts);
  const yy = d.getFullYear();
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  const hh = String(d.getHours()).padStart(2,'0');
  const mi = String(d.getMinutes()).padStart(2,'0');
  return `${yy}.${mm}.${dd} ${hh}:${mi}`;
}

function loadChgLogs() {
  try { return JSON.parse(localStorage.getItem('sr-chg-log') || '[]'); } catch(e) { return []; }
}
function saveChgLogs(logs) {
  localStorage.setItem('sr-chg-log', JSON.stringify(logs));
}

function addChgLog(id, name, from, to) {
  const logs = loadChgLogs();
  logs.unshift({ id, name, from, to, ts: Date.now() });
  saveChgLogs(logs);
  updateBadge(logs.length);
}

function updateBadge(n) {
  const b = document.getElementById('chg-badge');
  if (n > 0) { b.textContent = n > 99 ? '99+' : n; b.classList.add('show'); }
  else { b.classList.remove('show'); }
}

let selectMode = false;

function openChgPanel() {
  selectMode = false;
  renderChgList();
  document.getElementById('chg-ov').classList.add('on');
}
function closeChgPanel() {
  exitSelectMode();
  document.getElementById('chg-ov').classList.remove('on');
}

function enterSelectMode() {
  selectMode = true;
  document.getElementById('chg-header').classList.add('hidden');
  document.getElementById('chg-sel-header').classList.add('on');
  document.getElementById('chg-selall-bar').classList.add('on');
  document.getElementById('chg-selall-cb').checked = false;
  updateSelInfo();
  // 체크박스 보이기
  document.querySelectorAll('.chg-item-cb').forEach(cb => cb.classList.add('on'));
  document.querySelectorAll('.chg-item').forEach(item => {
    item.style.paddingLeft = '46px';
    item.querySelector('.chg-item-cb').checked = false;
  });
}

function exitSelectMode() {
  selectMode = false;
  document.getElementById('chg-header').classList.remove('hidden');
  document.getElementById('chg-sel-header').classList.remove('on');
  document.getElementById('chg-selall-bar').classList.remove('on');
  document.querySelectorAll('.chg-item-cb').forEach(cb => { cb.classList.remove('on'); cb.checked = false; });
  document.querySelectorAll('.chg-item').forEach(item => { item.classList.remove('selected'); item.style.paddingLeft = '14px'; });
}

function toggleSelectAll(checked) {
  document.querySelectorAll('.chg-item-cb').forEach(cb => { cb.checked = checked; });
  document.querySelectorAll('.chg-item').forEach(item => {
    if (checked) item.classList.add('selected'); else item.classList.remove('selected');
  });
  updateSelInfo();
}

function onItemCheck(cb, idx) {
  const item = document.getElementById('chg-item-' + idx);
  if (cb.checked) item.classList.add('selected'); else item.classList.remove('selected');
  // 전체 선택 체크박스 동기화
  const all = document.querySelectorAll('.chg-item-cb');
  const checked = document.querySelectorAll('.chg-item-cb:checked');
  document.getElementById('chg-selall-cb').checked = all.length === checked.length;
  updateSelInfo();
}

function updateSelInfo() {
  const n = document.querySelectorAll('.chg-item-cb:checked').length;
  document.getElementById('chg-sel-info').textContent = n + '개 선택';
  const btn = document.getElementById('chg-sel-delete');
  btn.disabled = n === 0;
}

function deleteSelected() {
  const checks = document.querySelectorAll('.chg-item-cb:checked');
  if (!checks.length) return;
  const indices = Array.from(checks).map(cb => parseInt(cb.dataset.idx)).sort((a,b) => b-a);
  const logs = loadChgLogs();
  indices.forEach(i => logs.splice(i, 1));
  saveChgLogs(logs);
  updateBadge(logs.length);
  exitSelectMode();
  renderChgList();
  showToast('🗑️ ' + indices.length + '건 삭제 완료');
}

function renderChgList() {
  const logs = loadChgLogs();
  const box = document.getElementById('chg-list');
  if (!logs.length) {
    box.innerHTML = '<div class="chg-empty">📭 변경 이력이 없습니다</div>';
    return;
  }
  box.innerHTML = logs.map((log, i) => `
    <div class="chg-item" id="chg-item-${i}" style="padding-left:14px">
      <input type="checkbox" class="chg-item-cb" data-idx="${i}" onchange="onItemCheck(this,${i})">
      <div class="chg-item-top">
        <div class="chg-item-id">금형 ${log.id}</div>
        <div class="chg-item-date">🕐 ${fmtDate(log.ts)}</div>
      </div>
      <div class="chg-item-arrow">
        <div class="chg-from">${log.from}</div>
        <div class="chg-arr">→</div>
        <div class="chg-to">${log.to}</div>
      </div>
      <div class="chg-item-name">${log.name || ''}</div>
    </div>`).join('');
  // 선택 모드 중이었으면 다시 적용
  if (selectMode) {
    document.querySelectorAll('.chg-item-cb').forEach(cb => cb.classList.add('on'));
    document.querySelectorAll('.chg-item').forEach(item => item.style.paddingLeft = '46px');
  }
}

function clearAllChg() {
  const logs = loadChgLogs();
  if (!logs.length) { showToast('삭제할 이력이 없습니다'); return; }
  if (!confirm('변경 이력을 모두 삭제할까요?')) return;
  saveChgLogs([]);
  updateBadge(0);
  exitSelectMode();
  renderChgList();
}

(function initBadge() {
  updateBadge(loadChgLogs().length);
})();

// localStorage에서 위치 오버라이드 불러오기
(function loadOverrides() {

/* ── 뒤로가기 버튼 처리 ── */
const layerStack = [];

function pushLayer(name) {
  history.pushState({ layer: name }, '');
  layerStack.push(name);
}
function popLayer() {
  layerStack.pop();
}

const _origOpenModal = openModal;
openModal = function(id) {
  _origOpenModal(id);
  pushLayer('modal');
};

const _origOpenChgPanel = openChgPanel;
openChgPanel = function() {
  _origOpenChgPanel();
  pushLayer('chg');
};

// 관리자 버튼 클릭 → 비번창 열릴 때 스택 push (toggleEditMode 직접 수정 대신 버튼에서 처리)
document.getElementById('admin-btn').addEventListener('click', function() {
  if (!editMode) {
    // 비번창이 곧 열릴 예정 → pushLayer
    setTimeout(() => {
      if (document.getElementById('pw-ov').classList.contains('on')) pushLayer('pw');
    }, 50);
  }
}, true);

window.addEventListener('popstate', function(e) {
  const layer = layerStack[layerStack.length - 1];
  if (!layer) return;
  popLayer();
  if (layer === 'modal') {
    document.getElementById('ov').classList.remove('on');
  } else if (layer === 'chg') {
    if (selectMode) {
      exitSelectMode();
      history.pushState({ layer: 'chg' }, '');
      layerStack.push('chg');
    } else {
      closeChgPanel();
    }
  } else if (layer === 'pw') {
    document.getElementById('pw-ov').classList.remove('on');
  }
});

      // binId 없으면 먼저 생성
      if (!binId) {
        const newId = await jbCreate({ locOverrides: locOv, producerOverrides: prodOv, chgLog, updatedAt });
        if (newId) {
          binId = newId;
          localStorage.setItem(JBIN_ID_KEY, binId);
          lastRemoteUpdatedAt = updatedAt;
          setStatus('ok', '저장됨 ✓');
        } else {
          setStatus('offline', '저장 실패');
          if (typeof showToast === 'function') showToast('⚠️ 클라우드 저장 실패 - 로컬에는 저장됨');
        }
        return;
      }

      const ok = await jbSet({ locOverrides: locOv, producerOverrides: prodOv, chgLog, updatedAt });
      if (ok) {
        lastRemoteUpdatedAt = updatedAt;
        setStatus('ok', '저장됨 ✓');
        // 재고관리 Bin도 위치/생산자 업데이트
        try {
          const invBinId = '6a194785ddf5aa59f7734288';
          const invR = await fetch('https://api.jsonbin.io/v3/b/' + invBinId + '/latest', { headers: { 'X-Master-Key': JBIN_KEY } });
          if (invR.ok) {
            let invData = ((await invR.json()).record) || [];
            if (Array.isArray(invData)) {
              let changed = false;
              if (locOv) Object.entries(locOv).forEach(([id, loc]) => { const it = invData.find(i => i.id === id); if (it && it.location !== loc) { it.location = loc; changed = true; } });
              if (prodOv) Object.entries(prodOv).forEach(([id, prod]) => { const it = invData.find(i => i.id === id); if (it && it.producer !== prod) { it.producer = prod; changed = true; } });
              if (changed) await fetch('https://api.jsonbin.io/v3/b/' + invBinId, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-Master-Key': JBIN_KEY }, body: JSON.stringify(invData) });
            }
          }
        } catch(e) {}
      } else {
        setStatus('offline', '저장 실패');
        if (typeof showToast === 'function') showToast('⚠️ 클라우드 저장 실패 - 로컬에는 저장됨');
      }
    } catch (err) {
      console.warn('[cloudSync] push 실패:', err);
      setStatus('offline', '저장 실패');
    } finally {
      isPushing = false;
    }
  }

  function schedulePush() {
    clearTimeout(pushTimer);
    pushTimer = setTimeout(push, PUSH_DEBOUNCE);
  }
  window.cloudPush = schedulePush;
  window.cloudPull = pull;

  const HOOK_FUNCS = ['saveLocation', 'saveProducer', 'deleteProducer', 'saveChgLogs'];
  HOOK_FUNCS.forEach(fnName => {
    const orig = window[fnName];
    if (typeof orig !== 'function') return;
    window[fnName] = function() {
      const r = orig.apply(this, arguments);
      if (window.editMode || (typeof editMode !== 'undefined' && editMode)) {
        schedulePush();
      }
      return r;
    };
  });

  const origConfirmPw = window.confirmPw;
  if (typeof origConfirmPw === 'function') {
    window.confirmPw = function() {
      const v = document.getElementById('pw-input').value;
      const r = origConfirmPw.apply(this, arguments);
      if (window.editMode || editMode) window._editPassword = v;
      return r;
    };
  }

  const origToggle = window.toggleEditMode;
  if (typeof origToggle === 'function') {
    window.toggleEditMode = function() {
      const wasEdit = window.editMode || editMode;
      const r = origToggle.apply(this, arguments);
      if (wasEdit && !(window.editMode || editMode)) window._editPassword = '';
      return r;
    };
  }

  window.addEventListener('load', () => {
    setTimeout(() => { pull(false); syncFromInvBin(); }, 300);
  });

  setInterval(() => {
    if (isPushing || pushTimer) return;
    pull(false);
  }, POLL_INTERVAL);

  // 재고관리 Bin도 5초마다 동기화
  setInterval(syncFromInvBin, 5000);

  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') pull(false);
  });

  window.addEventListener('beforeunload', () => {
    if (pushTimer) {
      clearTimeout(pushTimer);
      const data = JSON.stringify({
        locOverrides: JSON.parse(localStorage.getItem('sr-loc-overrides') || '{}'),
        producerOverrides: JSON.parse(localStorage.getItem('sr-producer-overrides') || '{}'),
        chgLog: JSON.parse(localStorage.getItem('sr-chg-log') || '[]'),
        updatedAt: Date.now()
      });
      if (binId) {
        fetch('https://api.jsonbin.io/v3/b/' + binId, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', 'X-Master-Key': JBIN_KEY },
          body: data,
          keepalive: true
        });
      }
    }
  });
})();

</script>
</body>
</html>
